<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>📜 Trade History</title>
<style>*{box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#0f172a;color:#e2e8f0;padding:1.5rem;font-size:1.2rem}.container{max-width:1000px;margin:auto}.card{background:#1e293b;border-radius:1.5rem;padding:2rem;margin-bottom:2rem}.nav{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1rem;background:#0f172a;padding:0.8rem;border-radius:1rem}.nav a{color:#60a5fa;text-decoration:none;font-weight:600;padding:0.4rem 0.8rem}.nav a:hover{color:#facc15}.log{background:#0f172a;padding:0.5rem;border-radius:0.5rem;max-height:200px;overflow-y:auto;font-family:monospace;margin-top:1rem}</style>
</head>
<body>
<div class="container"><div class="nav"><a href="/">🏠 Home</a><a href="/trading">📊 Trading</a><a href="/portfolio">💼 Portfolio</a><a href="/mining">⛏️ Mining</a><a href="/history">📜 History</a><a href="/roundup">🪙 Round‑Up</a><a href="/receipt-invest">🧾 Receipt</a><a href="/referral">👥 Referral</a><a href="/xmr-miner">⛏️ XMR</a><a href="/micro-teller">🧾 Teller</a></div><div class="card"><h1>📜 Trade History</h1>
<p>All your past trades.</p>
<div id="historyList" class="log">Loading...</div>
<script>
async function loadHistory() {
  const res = await fetch("/api/trade/history", { credentials: "include" });
  const data = await res.json();
  if (data.length === 0) return document.getElementById("historyList").innerHTML = "No trades yet.";
  let html = "";
  data.slice(-10).reverse().forEach(t => {
    html += `<div style="background:#0f172a;padding:0.5rem;border-radius:0.5rem;margin:0.3rem 0;">${t.symbol} – $${t.amountUSD} – ${t.tradeType} – profit $${(t.profit||0).toFixed(4)}</div>`;
  });
  document.getElementById("historyList").innerHTML = html;
}
loadHistory();
</script>
</div></div></body></html>
