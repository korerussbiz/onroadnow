<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>History</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: 'Inter', sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        padding: 1.5rem;
        font-size: 1.2rem;
      }
      .container {
        max-width: 900px;
        margin: auto;
      }
      .card {
        background: #1e293b;
        border-radius: 1.5rem;
        padding: 2rem;
        margin-bottom: 2rem;
      }
      .nav {
        display: flex;
        gap: 1.2rem;
        flex-wrap: wrap;
        margin-bottom: 2rem;
        font-size: 1.2rem;
      }
      .nav a {
        color: #60a5fa;
        text-decoration: none;
        font-weight: 600;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 0.5rem;
        text-align: left;
        border-bottom: 1px solid #334155;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="nav">
        <a href="/">🏠 Home</a>
        <a href="/trading">📊 Trading</a>
        <a href="/portfolio">💼 Portfolio</a>
        <a href="/mining">⛏️ Mining</a>
        <a href="/history">📜 History</a>
      </div>
      <div class="card">
        <h1>📜 Trade History</h1>
        <div id="historyTable"><p>Loading...</p></div>
      </div>
    </div>
    <script>
      async function loadHistory() {
        const res = await fetch('/api/trade/history', { credentials: 'include' });
        const data = await res.json();
        if (data.length === 0)
          return (document.getElementById('historyTable').innerHTML = '<p>No trades yet.</p>');
        let html = '<table><tr><th>Symbol</th><th>Amount</th><th>Type</th><th>Profit</th></tr>';
        data
          .slice(-20)
          .reverse()
          .forEach((t) => {
            html += `<tr><td>${t.symbol}</td><td>$${t.amountUSD}</td><td>${t.tradeType}</td><td>${(t.profit || 0).toFixed(4)}</td></tr>`;
          });
        html += '</table>';
        document.getElementById('historyTable').innerHTML = html;
      }
      loadHistory();
    </script>
  </body>
</html>
