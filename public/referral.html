<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Referral System</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 1.5rem; font-size: 1.2rem; }
    .container { max-width: 800px; margin: auto; }
    .card { background: #1e293b; border-radius: 1.5rem; padding: 2rem; margin-bottom: 2rem; }
    .nav { display: flex; gap: 1.2rem; flex-wrap: wrap; margin-bottom: 2rem; font-size: 1.3rem; }
    .nav a { color: #60a5fa; text-decoration: none; font-weight: 600; }
    .nav a:hover { color: #facc15; }
    .flex { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; margin: 1rem 0; }
    .btn { background: #3b82f6; border: none; padding: 0.8rem 1.8rem; border-radius: 2rem; color: white; font-weight: 600; font-size: 1.2rem; cursor: pointer; }
    .btn-success { background: #10b981; }
    .stat { font-size: 2rem; font-weight: bold; color: #facc15; margin: 0.5rem 0; }
    .log { background: #0f172a; border-radius: 1rem; padding: 1.2rem; max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 1rem; margin-top: 1.5rem; }
  </style>
</head>
<body>
<div class="container">
  <div class="nav">
    <a href="/">🏠 Home</a>
    <a href="/auto-trader">🤖 Auto‑Trader</a>
    <a href="/stock-trader">📈 Stocks</a>
    <a href="/claimer">💰 Claim</a>
    <a href="/referral">👥 Referrals</a>
    <a href="/roundup">🪙 Round‑Up</a>
    <a href="/receipt-invest">🧾 Receipt</a>
    <a href="/history">📜 History</a>
  </div>

  <div class="card">
    <h1>👥 Referral & MLM</h1>
    <p>Share your referral link and earn commissions.</p>
    <div class="flex">
      <span style="font-size:1.4rem;">Your link: <span id="refLink">Loading...</span></span>
      <button id="copyBtn" class="btn">📋 Copy</button>
    </div>
    <div class="stat" id="earnings">Earnings: $0.00</div>
    <div style="font-size:1.3rem;" id="downline">Downline: 0 users</div>
    <div id="log" class="log">Ready.</div>
  </div>
</div>
<script>
  async function apiCall(endpoint, options = {}) {
    const res = await fetch(`/api/referral/${endpoint}`, { ...options, credentials: 'include', headers: { 'Content-Type': 'application/json' } });
    return res.json();
  }
  function addLog(msg) {
    const logDiv = document.getElementById('log');
    const p = document.createElement('div');
    p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logDiv.appendChild(p);
    logDiv.scrollTop = logDiv.scrollHeight;
  }
  async function fetchData() {
    try {
      const data = await apiCall('tree', { method: 'GET' });
      document.getElementById('earnings').textContent = `Earnings: $${(data.earnings || 0).toFixed(2)}`;
      document.getElementById('downline').textContent = `Downline: ${(data.referrals || []).length} users`;
    } catch(e) { addLog('❌ Failed to load referral data'); }
  }
  document.getElementById('copyBtn').onclick = () => {
    const link = window.location.origin + '/?ref=' + (document.cookie?.match(/userId=([^;]+)/)?.[1] || '');
    navigator.clipboard?.writeText(link);
    addLog('📋 Link copied!');
  };
  fetchData();
  setInterval(fetchData, 30000);
</script>
  <button id="depositBtn" class="btn" style="background:#f7931a;font-size:1.2rem;padding:0.8rem 2rem;">💰 Deposit</button>
  <script>
  document.getElementById("depositBtn")?.addEventListener("click", async function() {
    const res = await fetch("/api/deposit", { credentials: "include" });
    const data = await res.json();
    if (data.url) window.open(data.url, "_blank");
    else alert("Deposit URL not set.");
  });
  </script>
</body>
</html>
