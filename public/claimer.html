<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnRoadNow – Auto Claim Bot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; padding: 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    .card { background: #1e293b; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1.5rem; }
    .btn { background: #3b82f6; border: none; padding: 0.5rem 1.2rem; border-radius: 2rem; color: white; font-weight: 600; cursor: pointer; margin-right: 0.5rem; }
    .btn-danger { background: #ef4444; }
    .btn-success { background: #10b981; }
    .log { background: #0f172a; border-radius: 1rem; padding: 1rem; max-height: 300px; overflow-y: auto; font-family: monospace; margin-top: 1rem; font-size: 0.8rem; }
    .claim-item { background: #0f172a; margin: 0.5rem 0; padding: 0.5rem; border-radius: 0.5rem; }
    .nav { margin-bottom: 1rem; }
    .nav a { color: #94a3b8; text-decoration: none; margin-right: 1rem; }
    .flex { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
    .status { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 0.5rem; }
    .status-running { background: #10b981; box-shadow: 0 0 5px #10b981; }
    .status-stopped { background: #ef4444; }
  </style>
</head>
<body>
<div class="container">
  <div class="nav">
    <a href="/">Home</a> | <a href="/auto-trader">Auto‑Trader</a> | <a href="/claimer">Claim Bot</a>
  </div>
  <div class="card">
    <h2>🤖 Auto‑Claim Bot (Optimized)</h2>
    <div class="flex">
      <button id="startAutoBtn" class="btn btn-success">▶️ Start Auto Mode</button>
      <button id="stopAutoBtn" class="btn btn-danger">⏹️ Stop Auto Mode</button>
      <span id="autoStatus" style="display: inline-flex; align-items: center;"><span class="status status-stopped"></span> Stopped</span>
    </div>
    <button id="scanNowBtn" class="btn">🔍 Scan Now (manual)</button>
    <button id="claimAllBtn" class="btn">💰 Claim All (manual)</button>
  </div>
  <div class="card">
    <h3>📋 Pending Claims</h3>
    <div id="claimsList"></div>
  </div>
  <div class="card">
    <h3>📜 Activity Log</h3>
    <div id="log" class="log"></div>
  </div>
</div>
<script>
  let autoInterval = null;
  let isAutoRunning = false;
  let mockClaims = [];

  function addLog(msg, isError = false) {
    const logDiv = document.getElementById('log');
    const p = document.createElement('div');
    p.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
    if (isError) p.style.color = '#f87171';
    logDiv.appendChild(p);
    logDiv.scrollTop = logDiv.scrollHeight;
    while (logDiv.children.length > 100) logDiv.removeChild(logDiv.firstChild);
  }

  function updateClaimsUI() {
    const container = document.getElementById('claimsList');
    if (!mockClaims.length) {
      container.innerHTML = '<div style="color:#94a3b8;">No pending claims</div>';
      return;
    }
    container.innerHTML = '';
    mockClaims.forEach(c => {
      const div = document.createElement('div');
      div.className = 'claim-item';
      div.innerHTML = `<strong>${c.token}</strong> – ${c.amount} on ${c.chain}<br><small>${c.contract}</small>`;
      container.appendChild(div);
    });
  }

  async function fetchClaims() {
    addLog("Scanning blockchain for claimable tokens...");
    await new Promise(r => setTimeout(r, 1200));
    // Replace with real RPC calls later
    mockClaims = [
      { token: "USDC", amount: 0.05, chain: "Ethereum", contract: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48" },
      { token: "SOL", amount: 0.002, chain: "Solana", contract: "So11111111111111111111111111111111111111112" },
      { token: "BONK", amount: 12345, chain: "Solana", contract: "DezXAZ8z7PnrnRJjz3wXBoRgixCa6xjnB7YaB1pPB263" }
    ];
    updateClaimsUI();
    addLog(`✅ Found ${mockClaims.length} claimable items.`);
    return mockClaims;
  }

  async function claimAll() {
    if (mockClaims.length === 0) { addLog("No claims to process."); return; }
    addLog("Attempting to claim all pending items...");
    for (let c of mockClaims) {
      await new Promise(r => setTimeout(r, 600));
      addLog(`✅ Claimed ${c.amount} ${c.token} from ${c.chain}`);
    }
    addLog("All claims processed.");
    mockClaims = [];
    updateClaimsUI();
  }

  async function autoCycle() {
    if (!isAutoRunning) return;
    addLog("🔄 Auto‑cycle: scanning...");
    await fetchClaims();
    if (mockClaims.length > 0) {
      addLog(`💰 Auto‑claiming ${mockClaims.length} items...`);
      await claimAll();
    } else {
      addLog("No claims found, waiting for next cycle.");
    }
  }

  function startAutoMode() {
    if (autoInterval) clearInterval(autoInterval);
    isAutoRunning = true;
    autoInterval = setInterval(autoCycle, 30000);
    document.getElementById('autoStatus').innerHTML = '<span class="status status-running"></span> Running (every 30s)';
    addLog("🚀 Auto Mode started.");
    autoCycle();
  }

  function stopAutoMode() {
    if (autoInterval) { clearInterval(autoInterval); autoInterval = null; }
    isAutoRunning = false;
    document.getElementById('autoStatus').innerHTML = '<span class="status status-stopped"></span> Stopped';
    addLog("⏹️ Auto Mode stopped.");
  }

  document.getElementById('startAutoBtn').onclick = startAutoMode;
  document.getElementById('stopAutoBtn').onclick = stopAutoMode;
  document.getElementById('scanNowBtn').onclick = fetchClaims;
  document.getElementById('claimAllBtn').onclick = claimAll;

  fetchClaims();
</script>
</body>
</html>
