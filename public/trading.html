<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>📊 Trading Dashboard</title>
<style>
*{box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0f172a;color:#e2e8f0;padding:1.5rem;font-size:1.2rem}
.container{max-width:1000px;margin:auto}
.card{background:#1e293b;border-radius:1.5rem;padding:2rem;margin-bottom:2rem}
.nav{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1rem;background:#0f172a;padding:0.8rem;border-radius:1rem}
.nav a{color:#60a5fa;text-decoration:none;font-weight:600;padding:0.4rem 0.8rem}
.nav a:hover{color:#facc15}
.btn{background:#3b82f6;padding:0.6rem 1.5rem;border-radius:2rem;color:#fff;text-decoration:none;display:inline-block;border:none;cursor:pointer}
.btn:hover{background:#2563eb}
.btn-buy{background:#10b981}
.btn-sell{background:#ef4444}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.stat{background:#0f172a;padding:1rem;border-radius:0.5rem;text-align:center}
.stat-value{font-size:2.5rem;color:#facc15}
.log{background:#0f172a;padding:0.5rem;border-radius:0.5rem;max-height:200px;overflow-y:auto;font-family:monospace;margin-top:1rem}
.flex{display:flex;gap:1rem;flex-wrap:wrap;align-items:center}
input,select{background:#0f172a;border:1px solid #334155;color:#fff;padding:0.6rem;border-radius:0.5rem;font-size:1rem}
</style>
</head>
<body>
<div class="container">
<div class="nav">
<a href="/">🏠 Home</a>
<a href="/trading">📊 Trading</a>
<a href="/portfolio">💼 Portfolio</a>
<a href="/mining">⛏️ Mining</a>
<a href="/history">📜 History</a>
<a href="/roundup">🪙 Round‑Up</a>
<a href="/receipt-invest">🧾 Receipt</a>
<a href="/referral">👥 Referral</a>
<a href="/xmr-miner">⛏️ XMR</a>
<a href="/micro-teller">🧾 Teller</a>
</div>
<div class="card">
<h1>📊 Trading Dashboard</h1>
<p>Trade stocks and crypto with real‑time prices. Paper trading (simulated).</p>
<div class="flex">
  <input type="text" id="symbol" value="BTC" placeholder="Symbol">
  <button class="btn" onclick="fetchPrice()">Get Price</button>
</div>
<div class="flex">
  <input type="number" id="amount" placeholder="Amount (USD)" step="0.01">
  <button class="btn btn-buy" onclick="trade('buy')">Buy</button>
  <button class="btn btn-sell" onclick="trade('sell')">Sell</button>
</div>
<div class="grid">
  <div class="stat"><div class="stat-value" id="price">—</div><div>Price</div></div>
  <div class="stat"><div class="stat-value" id="balance">$1000.00</div><div>Balance</div></div>
</div>
<div id="log" class="log">Ready.</div>
<script>
let balance = 1000;
async function fetchPrice() {
  const symbol = document.getElementById("symbol").value;
  const res = await fetch(`/api/trade/price?symbol=${symbol}`);
  const data = await res.json();
  document.getElementById("price").textContent = "$" + data.price;
}
async function trade(type) {
  const symbol = document.getElementById("symbol").value;
  const amount = parseFloat(document.getElementById("amount").value);
  if (!symbol || isNaN(amount)) return alert("Enter valid data");
  const res = await fetch("/api/trade/execute", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ symbol, amountUSD: amount, tradeType: type })
  });
  const data = await res.json();
  balance += type === "buy" ? -amount : amount;
  document.getElementById("balance").textContent = "$" + balance.toFixed(2);
  document.getElementById("log").innerHTML += `[${new Date().toLocaleTimeString()}] ${type} ${symbol} at $${data.price}<br>`;
  document.getElementById("log").scrollTop = document.getElementById("log").scrollHeight;
}
</script>
</div>
</div>
</body>
</html>
