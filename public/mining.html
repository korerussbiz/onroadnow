<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>⛏️ Mining Dashboard</title>
<style>*{box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#0f172a;color:#e2e8f0;padding:1.5rem;font-size:1.2rem}.container{max-width:1000px;margin:auto}.card{background:#1e293b;border-radius:1.5rem;padding:2rem;margin-bottom:2rem}.nav{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1rem;background:#0f172a;padding:0.8rem;border-radius:1rem}.nav a{color:#60a5fa;text-decoration:none;font-weight:600;padding:0.4rem 0.8rem}.nav a:hover{color:#facc15}.btn{background:#3b82f6;padding:0.6rem 1.5rem;border-radius:2rem;color:#fff;text-decoration:none;display:inline-block;border:none;cursor:pointer}.btn:hover{background:#2563eb}.grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}.stat{background:#0f172a;padding:1rem;border-radius:0.5rem;text-align:center}.stat-value{font-size:2.5rem;color:#facc15}.log{background:#0f172a;padding:0.5rem;border-radius:0.5rem;max-height:200px;overflow-y:auto;font-family:monospace;margin-top:1rem}</style>
</head>
<body>
<div class="container"><div class="nav"><a href="/">🏠 Home</a><a href="/trading">📊 Trading</a><a href="/portfolio">💼 Portfolio</a><a href="/mining">⛏️ Mining</a><a href="/history">📜 History</a><a href="/roundup">🪙 Round‑Up</a><a href="/receipt-invest">🧾 Receipt</a><a href="/referral">👥 Referral</a><a href="/xmr-miner">⛏️ XMR</a><a href="/micro-teller">🧾 Teller</a></div><div class="card"><h1>⛏️ Mining Dashboard</h1>
<p>Live Monero mining stats from SupportXMR.</p>
<div class="grid"><div class="stat"><div class="stat-value" id="miningHashrate">0 H/s</div><div>Hashrate</div></div><div class="stat"><div class="stat-value" id="miningBalance">0.000000 XMR</div><div>Unpaid</div></div><div class="stat"><div class="stat-value" id="miningValue">$0.00</div><div>Value</div></div></div>
<button class="btn" onclick="refreshMiningStats()">🔄 Refresh</button>
<div id="miningLog" class="log">Loading stats...</div>
<script>
async function refreshMiningStats() {
  try {
    const res = await fetch("/api/mining/stats", { credentials: "include" });
    const data = await res.json();
    document.getElementById("miningHashrate").textContent = data.hashrate.toLocaleString() + " H/s";
    document.getElementById("miningBalance").textContent = data.balance.toFixed(6) + " XMR";
    document.getElementById("miningValue").textContent = "$" + data.valueUSD.toFixed(2);
    document.getElementById("miningLog").innerHTML = "✅ Stats updated " + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById("miningLog").innerHTML = "❌ " + e.message;
  }
}
refreshMiningStats();
setInterval(refreshMiningStats, 30000);
</script>
</div></div></body></html>
