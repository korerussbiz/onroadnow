<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnRoadNow – Complete Trading System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; padding: 1rem; }
    .container { max-width: 1200px; margin: 0 auto; text-align: center; }
    .card { background: #1e293b; border-radius: 1.5rem; padding: 2rem; margin-bottom: 1.5rem; }
    h1 { font-size: 2.5rem; color: #facc15; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
    .module { background: #0f172a; border-radius: 1rem; padding: 1.5rem; transition: 0.2s; }
    .module:hover { transform: scale(1.02); border: 1px solid #facc15; }
    .module a { color: #94a3b8; text-decoration: none; font-weight: 600; display: block; }
    .module a:hover { color: #facc15; }
    .btn { background: #3b82f6; border: none; padding: 0.5rem 1.2rem; border-radius: 2rem; color: white; font-weight: 600; cursor: pointer; margin-top: 1rem; }
    .btn-success { background: #10b981; }
    .btn-warning { background: #eab308; }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>🚀 OnRoadNow</h1>
    <p>Complete Trading & Investment System – Crypto, Stocks, Receipt Investor, MLM</p>
  </div>
  <div class="grid">
    <div class="module"><a href="/auto-trader">🤖 Auto‑Trader (Crypto)</a></div>
    <div class="module"><a href="/stock-trader">📈 Stock Trader</a></div>
    <div class="module"><a href="/claimer">💰 Claim Bot</a></div>
    <div class="module"><a href="/receipt">🧾 Receipt Investor</a></div>
    <div class="module"><a href="/referral">👥 Referral & MLM</a></div>
    <div class="module"><a href="/history">📊 Trade History</a></div>
  </div>
  <div style="margin-top: 2rem;">
    <a href="/dashboard" class="btn btn-success">📊 Dashboard</a>
    <a href="/settings" class="btn btn-warning">⚙️ Settings</a>
  </div>
</div>
</body>
</html>
