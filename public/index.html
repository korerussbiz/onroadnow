<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnRoadNow – Members & Marketplace</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f8fafc; padding: 1rem; }
    .container { max-width: 1200px; margin: 0 auto; }
    .card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); padding: 1.5rem; margin-bottom: 1.5rem; }
    .card-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; border-bottom: 2px solid #eef2ff; padding-bottom: 0.75rem; }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.2rem; border-radius: 9999px; font-weight: 600; border: none; cursor: pointer; background: #f1f5f9; }
    .btn-primary { background: #2563eb; color: white; }
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    input, select, textarea { width: 100%; padding: 0.75rem 1rem; border: 1px solid #cbd5e1; border-radius: 1rem; }
    #map { height: 400px; border-radius: 1rem; margin-bottom: 1rem; }
    .place-list { max-height: 300px; overflow-y: auto; background: white; border-radius: 1rem; border: 1px solid #e2e8f0; margin-top: 1rem; }
    .place { padding: 0.9rem 1rem; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
    .hidden { display: none; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
  </style>
</head>
<body>
<div class="container">
  <div class="flex-between">
    <h1>🏍️ OnRoadNow</h1>
    <div id="authSection"></div>
  </div>

  <!-- Member Dashboard (after login) -->
  <div id="memberDashboard" class="card hidden">
    <div class="card-header"><span>👤</span><h3>Member Dashboard</h3></div>
    <div id="profileInfo"></div>
    <div class="form-group"><label>Phone Number (for job contacts)</label><input type="tel" id="phoneInput" placeholder="+1234567890"></div>
    <button id="savePhoneBtn" class="btn btn-primary">Save Phone</button>
    <hr>
    <h4>Your Sales History</h4>
    <div id="salesLogs"></div>
    <hr>
    <h4>Post an Item for Sale (marketplace)</h4>
    <div class="form-group"><input type="text" id="itemTitle" placeholder="Title"></div>
    <div class="form-group"><textarea id="itemDesc" placeholder="Description"></textarea></div>
    <div class="form-group"><input type="number" id="itemPrice" placeholder="Price (JMD)"></div>
    <div class="form-group"><input type="number" id="itemFee" placeholder="Fee % (1-3.8)" value="2"></div>
    <button id="postListingBtn" class="btn btn-primary">Post Listing</button>
    <div id="listings"></div>
  </div>

  <!-- Map and delivery features (same as before) -->
  <div class="card"><div class="card-header"><span>📍</span><h3>Find Stores & Shops</h3></div><div id="map"></div><div id="places" class="place-list"></div></div>
  <!-- ... rest of delivery forms ... (keep existing) -->
</div>

<script>
  // Helper to call API with credentials
  async function apiCall(url, options = {}) {
    const res = await fetch(url, {
      ...options,
      credentials: 'include',
      headers: { 'Content-Type': 'application/json', ...options.headers }
    });
    return res.json();
  }

  let currentUser = null;
  const authDiv = document.getElementById('authSection');
  const memberDash = document.getElementById('memberDashboard');
  const profileInfo = document.getElementById('profileInfo');
  const phoneInput = document.getElementById('phoneInput');
  const salesLogsDiv = document.getElementById('salesLogs');

  async function checkAuth() {
    const data = await apiCall('/api/me');
    if (data.id) {
      currentUser = data;
      authDiv.innerHTML = `<span>👋 ${data.email} <button id="logoutBtn" class="btn">Logout</button></span>`;
      document.getElementById('logoutBtn').onclick = async () => {
        await apiCall('/api/logout', { method: 'POST' });
        location.reload();
      };
      memberDash.classList.remove('hidden');
      profileInfo.innerHTML = `<strong>Name:</strong> ${data.name || '—'}<br><strong>Email:</strong> ${data.email}`;
      phoneInput.value = data.phone || '';
      // Load sales
      const sales = await apiCall('/api/sales');
      salesLogsDiv.innerHTML = sales.map(s => `<div>Sold: ID ${s.listingId} for $${s.amount} (fee $${s.fee}) on ${new Date(s.timestamp).toLocaleString()}</div>`).join('');
      loadListings();
    } else {
      authDiv.innerHTML = `
        <div class="card" style="padding:1rem;">
          <h3>Login / Signup</h3>
          <input type="email" id="loginEmail" placeholder="Email"><br>
          <input type="password" id="loginPassword" placeholder="Password"><br>
          <button id="loginBtn" class="btn">Login</button>
          <button id="signupBtn" class="btn btn-primary">Signup</button>
          <p id="authMsg"></p>
        </div>
      `;
      document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('loginEmail').value;
        const pwd = document.getElementById('loginPassword').value;
        const res = await apiCall('/api/login', { method: 'POST', body: JSON.stringify({ email, password: pwd }) });
        if (res.error) alert(res.error);
        else location.reload();
      };
      document.getElementById('signupBtn').onclick = async () => {
        const email = document.getElementById('loginEmail').value;
        const pwd = document.getElementById('loginPassword').value;
        const name = prompt('Your name:');
        if (!name) return;
        const res = await apiCall('/api/signup', { method: 'POST', body: JSON.stringify({ email, password: pwd, name }) });
        if (res.error) alert(res.error);
        else location.reload();
      };
      memberDash.classList.add('hidden');
    }
  }

  async function loadListings() {
    const listings = await apiCall('/api/listings');
    const container = document.getElementById('listings');
    if (!container) return;
    container.innerHTML = '<h4>Marketplace Items</h4>';
    listings.forEach(l => {
      const div = document.createElement('div'); div.className = 'card';
      div.innerHTML = `<strong>${l.title}</strong><br>${l.description}<br>Price: JMD ${l.price}<br>Fee: ${l.feePercent}%<br><button onclick="buyListing(${l.id})" class="btn">Buy</button>`;
      container.appendChild(div);
    });
  }
  window.buyListing = async (id) => {
    const res = await apiCall('/api/purchase', { method: 'POST', body: JSON.stringify({ listingId: id }) });
    if (res.error) alert(res.error);
    else { alert('Purchase recorded!'); loadListings(); }
  };

  document.getElementById('savePhoneBtn')?.addEventListener('click', async () => {
    const phone = phoneInput.value;
    await apiCall('/api/user', { method: 'POST', body: JSON.stringify({ phone }) });
    alert('Phone saved');
  });

  document.getElementById('postListingBtn')?.addEventListener('click', async () => {
    const title = document.getElementById('itemTitle').value;
    const description = document.getElementById('itemDesc').value;
    const price = parseFloat(document.getElementById('itemPrice').value);
    const feePercent = parseFloat(document.getElementById('itemFee').value);
    const res = await apiCall('/api/listings', { method: 'POST', body: JSON.stringify({ title, description, price, feePercent }) });
    if (res.error) alert(res.error);
    else { alert('Listing posted!'); loadListings(); }
  });

  // ---- Map (Leaflet) ----
  const map = L.map('map').setView([18.4655, -77.9223], 14);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© OSM' }).addTo(map);
  let markers = [];
  const placesDiv = document.getElementById('places');
  async function fetchNearby(lat, lon) {
    const res = await fetch(`/api/nearby?lat=${lat}&lon=${lon}&radius=2000`);
    const data = await res.json();
    markers.forEach(m => map.removeLayer(m)); markers = [];
    placesDiv.innerHTML = '';
    if (data.elements?.length) {
      data.elements.forEach(el => {
        const name = el.tags?.name || 'Unnamed';
        const latlng = [el.lat, el.lon];
        const marker = L.marker(latlng).addTo(map).bindPopup(name);
        markers.push(marker);
        const div = document.createElement('div'); div.className = 'place'; div.innerText = name;
        div.onclick = () => {
          document.getElementById('storeName') && (document.getElementById('storeName').value = name);
          map.setView(latlng, 16);
          marker.openPopup();
        };
        placesDiv.appendChild(div);
      });
    } else placesDiv.innerHTML = '<div style="padding:1rem;">No shops found. Move map.</div>';
  }
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => { map.setView([pos.coords.latitude, pos.coords.longitude], 14); fetchNearby(pos.coords.latitude, pos.coords.longitude); },
      () => fetchNearby(18.4655, -77.9223)
    );
  } else fetchNearby(18.4655, -77.9223);
  map.on('moveend', () => { const c = map.getCenter(); fetchNearby(c.lat, c.lng); });

  // ... (rest of delivery request forms – keep your existing working code) ...

  checkAuth();
</script>
</body>
</html>
