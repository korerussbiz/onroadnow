<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Montego Bay Delivery</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { font-family: Arial; margin:0; padding:20px; }
    #map { height: 400px; width: 100%; margin-bottom: 20px; }
    .place-list { margin-top: 20px; }
    .place { cursor: pointer; padding: 8px; border-bottom: 1px solid #ccc; }
    .place:hover { background: #f0f0f0; }
    button { padding: 10px; margin: 5px; }
  </style>
</head>
<body>
  <h1>Nearby Stores & Restaurants (Montego Bay)</h1>
  <div id="map"></div>
  <div class="place-list" id="places"></div>
  <hr>
  <h2>Create Delivery Request</h2>
  <form id="requestForm">
    <input type="text" id="storeName" placeholder="Store name" required><br>
    <input type="text" id="itemDesc" placeholder="Item description" required><br>
    <input type="number" id="itemCost" placeholder="Item cost (JMD)" required><br>
    <select id="paymentMethod" required>
      <option value="visa_mc">Visa/Mastercard</option>
      <option value="etransfer">E-Transfer</option>
      <option value="deliverer_fronts">Deliverer Fronts Cost (22.4% fee)</option>
    </select><br>
    <button type="submit">Post Request</button>
  </form>
  <hr>
  <h2>Open Requests</h2>
  <div id="requests"></div>

  <script>
    const map = L.map('map').setView([18.4655, -77.9223], 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
    }).addTo(map);

    let markers = [];

    async function fetchNearby(lat, lon) {
      const res = await fetch(`/api/nearby?lat=${lat}&lon=${lon}&radius=1000`);
      const data = await res.json();
      markers.forEach(m => map.removeLayer(m));
      markers = [];
      const placesDiv = document.getElementById('places');
      placesDiv.innerHTML = '';
      data.elements.forEach(el => {
        const name = el.tags?.name || 'Unnamed';
        const latlng = [el.lat, el.lon];
        const marker = L.marker(latlng).addTo(map).bindPopup(name);
        markers.push(marker);
        const div = document.createElement('div');
        div.className = 'place';
        div.innerText = name;
        div.onclick = () => {
          document.getElementById('storeName').value = name;
          map.setView(latlng, 16);
          marker.openPopup();
        };
        placesDiv.appendChild(div);
      });
    }

    map.on('moveend', () => {
      const center = map.getCenter();
      fetchNearby(center.lat, center.lng);
    });
    fetchNearby(18.4655, -77.9223);

    document.getElementById('requestForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const storeName = document.getElementById('storeName').value;
      const itemDesc = document.getElementById('itemDesc').value;
      const itemCost = parseFloat(document.getElementById('itemCost').value);
      const paymentMethod = document.getElementById('paymentMethod').value;
      const res = await fetch('/api/requests', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ storeName, itemDesc, itemCost, paymentMethod })
      });
      const request = await res.json();
      alert(`Request posted with ID ${request.id}`);
      loadRequests();
    });

    async function loadRequests() {
      const res = await fetch('/api/requests');
      const requests = await res.json();
      const container = document.getElementById('requests');
      container.innerHTML = '';
      requests.forEach(r => {
        const div = document.createElement('div');
        div.style.border = '1px solid #ccc';
        div.style.margin = '10px 0';
        div.style.padding = '10px';
        let feeNote = '';
        if (r.paymentMethod === 'deliverer_fronts') {
          const fee = r.itemCost * 0.224;
          feeNote = `<br><strong>Deliverer fronts cost – you receive ${r.itemCost + fee} JMD (${fee} fee included)</strong>`;
        }
        div.innerHTML = `
          <b>${r.storeName}</b><br>
          ${r.itemDesc}<br>
          Cost: ${r.itemCost} JMD<br>
          Payment: ${r.paymentMethod}<br>
          Status: ${r.status}${feeNote}
          <button onclick="acceptRequest(${r.id})">Accept</button>
        `;
        container.appendChild(div);
      });
    }

    async function acceptRequest(id) {
      const res = await fetch(`/api/accept?id=${id}`, { method: 'POST' });
      if (res.ok) {
        alert('Request accepted');
        loadRequests();
      } else {
        alert('Error accepting request');
      }
    }

    loadRequests();
  </script>
</body>
</html>
