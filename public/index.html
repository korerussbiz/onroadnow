<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>OnRoadNow – Global Delivery</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f8fafc; padding: 1rem; }
    .container { max-width: 1200px; margin: 0 auto; }
    .card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); padding: 1.5rem; margin-bottom: 1.5rem; }
    .card-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; border-bottom: 2px solid #eef2ff; padding-bottom: 0.75rem; }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.2rem; border-radius: 9999px; font-weight: 600; border: none; cursor: pointer; background: #f1f5f9; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-warning { background: #eab308; color: black; }
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    input, select { width: 100%; padding: 0.75rem 1rem; border: 1px solid #cbd5e1; border-radius: 1rem; }
    .place-list { max-height: 300px; overflow-y: auto; background: white; border-radius: 1rem; border: 1px solid #e2e8f0; margin-top: 1rem; }
    .place { padding: 0.9rem 1rem; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
    .place:hover { background: #f1f5f9; }
    #map { height: 400px; border-radius: 1rem; margin-bottom: 1rem; }
    .badge { background: #eef2ff; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; }
    .hidden { display: none; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
  </style>
</head>
<body>
<div class="container">
  <div class="flex-between">
    <h1>🏍️ OnRoadNow</h1>
    <div>👤 <span id="userIdDisplay">Guest</span> <button id="changeUserIdBtn" class="btn">Change ID</button></div>
  </div>
  <div class="card">
    <div class="card-header"><span>📍</span><h3>Find Stores & Shops Worldwide</h3></div>
    <div id="map"></div>
    <div id="places" class="place-list"><div style="padding:1rem; text-align:center;">Move map to load shops</div></div>
  </div>
  <div class="grid-2">
    <div class="card">
      <div class="card-header"><span>📦</span><h3>Post a Request</h3></div>
      <form id="requestForm">
        <div class="form-group"><input type="text" id="storeName" placeholder="Store name" required></div>
        <div class="form-group"><input type="text" id="itemDesc" placeholder="Item description" required></div>
        <div class="form-group"><input type="number" id="itemCost" placeholder="Item cost (JMD)" required></div>
        <div class="form-group"><select id="paymentMethod" required>
          <option value="visa_mc">Visa/Mastercard</option>
          <option value="etransfer">E-Transfer</option>
          <option value="deliverer_fronts">Deliverer Fronts Cost (+22.4% fee)</option>
        </select></div>
        <button type="submit" class="btn btn-primary">Post Request</button>
      </form>
    </div>
    <div class="card">
      <div class="card-header"><span>📱</span><h3>Deliverer Tools</h3></div>
      <div id="delivererControls">
        <button id="startTrackingBtn" class="btn btn-primary">📍 Start Tracking (go online)</button>
        <button id="stopTrackingBtn" class="btn btn-warning hidden">🛑 Stop Tracking (offline)</button>
        <p id="trackingStatus"></p>
      </div>
      <hr>
      <p><strong>Your Role:</strong> <select id="roleSelect"><option value="buyer">Customer</option><option value="deliverer">Deliverer</option></select></p>
      <p>Available deliverers: <span id="availCount">0</span></p>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><span>📋</span><h3>Open Requests</h3></div>
    <div id="requests"></div>
  </div>
  <div class="card">
    <div class="card-header"><span>🔄</span><h3>Your Active Deliveries (Customer view)</h3></div>
    <div id="activeDeliveries"></div>
  </div>
</div>
<script>
  // Simple user ID (no Firebase)
  let currentUserId = localStorage.getItem('onroadnow_userId') || 'user_' + Math.random().toString(36).substr(2, 8);
  localStorage.setItem('onroadnow_userId', currentUserId);
  document.getElementById('userIdDisplay').innerText = currentUserId.substr(0, 8);
  document.getElementById('changeUserIdBtn').onclick = () => {
    let newId = prompt('Enter new user ID:');
    if (newId) localStorage.setItem('onroadnow_userId', newId);
    location.reload();
  };

  let currentRole = localStorage.getItem('onroadnow_role') || 'buyer';
  document.getElementById('roleSelect').value = currentRole;
  document.getElementById('roleSelect').onchange = (e) => {
    localStorage.setItem('onroadnow_role', e.target.value);
    location.reload();
  };

  // Map initialization
  const map = L.map('map');
  // Try to get user's location, fallback to Montego Bay
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        map.setView([pos.coords.latitude, pos.coords.longitude], 14);
        fetchNearby(pos.coords.latitude, pos.coords.longitude);
      },
      () => {
        map.setView([18.4655, -77.9223], 14);
        fetchNearby(18.4655, -77.9223);
      }
    );
  } else {
    map.setView([18.4655, -77.9223], 14);
    fetchNearby(18.4655, -77.9223);
  }
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© OpenStreetMap' }).addTo(map);

  let markers = [];
  const placesDiv = document.getElementById('places');

  async function fetchNearby(lat, lon) {
    placesDiv.innerHTML = '<div style="padding:1rem;">Loading shops...</div>';
    try {
      const res = await fetch(`/api/nearby?lat=${lat}&lon=${lon}&radius=2000`);
      const data = await res.json();
      markers.forEach(m => map.removeLayer(m));
      markers = [];
      placesDiv.innerHTML = '';
      if (data.elements && data.elements.length) {
        data.elements.forEach(el => {
          const name = el.tags?.name || (el.tags?.shop ? 'Shop' : (el.tags?.amenity || 'Unnamed'));
          const latlng = [el.lat, el.lon];
          const marker = L.marker(latlng).addTo(map).bindPopup(name);
          markers.push(marker);
          const div = document.createElement('div');
          div.className = 'place';
          div.innerText = name;
          div.onclick = () => {
            document.getElementById('storeName').value = name;
            map.setView(latlng, 16);
            marker.openPopup();
          };
          placesDiv.appendChild(div);
        });
      } else {
        placesDiv.innerHTML = '<div style="padding:1rem;">No shops found in this area. Try moving map.</div>';
      }
    } catch (err) {
      console.error(err);
      placesDiv.innerHTML = '<div style="padding:1rem;">Error loading shops. Please retry.</div>';
    }
  }

  map.on('moveend', () => {
    const center = map.getCenter();
    fetchNearby(center.lat, center.lng);
  });

  // Request handling (same as before)
  document.getElementById('requestForm').onsubmit = async (e) => {
    e.preventDefault();
    const storeName = document.getElementById('storeName').value;
    const itemDesc = document.getElementById('itemDesc').value;
    const itemCost = parseFloat(document.getElementById('itemCost').value);
    const paymentMethod = document.getElementById('paymentMethod').value;
    await fetch('/api/requests', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ storeName, itemDesc, itemCost, paymentMethod, userId: currentUserId })
    });
    alert('Request posted!');
    loadRequests();
  };

  async function loadRequests() {
    const res = await fetch('/api/requests');
    const reqs = await res.json();
    const container = document.getElementById('requests');
    container.innerHTML = '';
    for (const r of reqs) {
      const div = document.createElement('div'); div.className = 'card'; div.style.marginBottom = '1rem';
      let actions = '';
      if (currentRole === 'deliverer' && r.status === 'open' && r.userId !== currentUserId) {
        actions = `<button onclick="acceptRequest(${r.id})" class="btn btn-primary">Accept</button>`;
        if (r.paymentMethod === 'deliverer_fronts') {
          actions += `<button onclick="offerLoan(${r.id})" class="btn btn-warning">💰 Front money</button>`;
        }
      }
      div.innerHTML = `<div><strong>${r.storeName}</strong><br>${r.itemDesc}<br>Cost: JMD ${r.itemCost}<br>Payment: ${r.paymentMethod}<br>Status: ${r.status}</div><div style="margin-top:0.5rem;">${actions}</div>`;
      container.appendChild(div);
    }
  }
  window.acceptRequest = async (id) => {
    await fetch(`/api/accept?id=${id}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ delivererId: currentUserId, delivererName: currentUserId }) });
    alert('Accepted');
    loadRequests();
    loadActiveDeliveries();
  };
  window.offerLoan = async (id) => {
    const amount = prompt('Amount to front (JMD):');
    if (amount) {
      await fetch('/api/offerLoan', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ requestId: id, delivererId: currentUserId, amountFronted: parseFloat(amount) }) });
      alert('Loan offer recorded');
    }
  };

  // Tracking (deliverer)
  let watchId = null;
  const startBtn = document.getElementById('startTrackingBtn');
  const stopBtn = document.getElementById('stopTrackingBtn');
  const trackingStatus = document.getElementById('trackingStatus');
  if (currentRole === 'deliverer') {
    startBtn.onclick = () => {
      if (!navigator.geolocation) return alert('Geolocation not supported');
      watchId = navigator.geolocation.watchPosition(async (pos) => {
        const { latitude, longitude } = pos.coords;
        await fetch('/api/updateLocation', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ delivererId: currentUserId, lat: latitude, lon: longitude, status: 'in_progress' }) });
        trackingStatus.innerText = `📍 ${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
      }, console.error, { enableHighAccuracy: true });
      startBtn.classList.add('hidden');
      stopBtn.classList.remove('hidden');
    };
    stopBtn.onclick = () => {
      if (watchId) navigator.geolocation.clearWatch(watchId);
      startBtn.classList.remove('hidden');
      stopBtn.classList.add('hidden');
      trackingStatus.innerText = '';
    };
  } else {
    startBtn.style.display = 'none';
    stopBtn.style.display = 'none';
  }

  async function loadActiveDeliveries() {
    if (currentRole !== 'buyer') return;
    const res = await fetch('/api/requests');
    const myRequests = (await res.json()).filter(r => r.userId === currentUserId && (r.status === 'accepted' || r.status === 'in_progress'));
    const container = document.getElementById('activeDeliveries');
    container.innerHTML = '';
    for (const req of myRequests) {
      const locRes = await fetch(`/api/getLocation?requestId=${req.id}`);
      const locData = await locRes.json();
      const div = document.createElement('div'); div.className = 'card';
      div.innerHTML = `<div><strong>${req.storeName}</strong><br>Deliverer: ${req.delivererName}<br>Status: ${locData.status}<br>Location: ${locData.location ? `${locData.location.lat.toFixed(5)}, ${locData.location.lon.toFixed(5)}` : 'Not yet'}</div>
        ${locData.status === 'in_progress' ? `<button onclick="confirmDelivery(${req.id})" class="btn btn-primary">Confirm Delivery & Release Payment</button>` : ''}`;
      container.appendChild(div);
    }
  }
  window.confirmDelivery = async (id) => {
    await fetch('/api/confirmDelivery', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ requestId: id, customerId: currentUserId }) });
    alert('Delivery confirmed. Deliverer will be paid.');
    loadActiveDeliveries();
    loadRequests();
  };
  setInterval(() => { if (currentRole === 'buyer') loadActiveDeliveries(); }, 5000);
  loadRequests();
  if (currentRole === 'buyer') loadActiveDeliveries();
</script>
</body>
</html>
