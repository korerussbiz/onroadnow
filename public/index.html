<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>OnRoadNow – Honest Delivery</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2772533792093956"
     crossorigin="anonymous"></script>
  <style>
    /* same modern styles as before, plus modal */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Roboto, system-ui, sans-serif; background: #f8fafc; padding: 1rem; }
    .container { max-width: 1200px; margin: 0 auto; }
    .card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); padding: 1.5rem; margin-bottom: 1.5rem; }
    .card-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; border-bottom: 2px solid #eef2ff; padding-bottom: 0.75rem; }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.2rem; border-radius: 9999px; font-weight: 600; border: none; cursor: pointer; background: #f1f5f9; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-warning { background: #eab308; color: black; }
    .btn-danger { background: #dc2626; color: white; }
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    input, select { width: 100%; padding: 0.75rem 1rem; border: 1px solid #cbd5e1; border-radius: 1rem; }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; max-width: 500px; width: 90%; border-radius: 1.5rem; padding: 1.5rem; }
    .hidden { display: none; }
    .badge { background: #eef2ff; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; }
  </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
  // Firebase config (REPLACE WITH YOURS)
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // Global state
  let currentUser = null;
  let watchId = null;  // geolocation watcher

  // Disclaimer / honesty policy (show once)
  if (!localStorage.getItem('disclaimerAccepted')) {
    document.body.innerHTML = `
      <div class="modal" id="disclaimerModal">
        <div class="modal-content">
          <h2>📜 Legal Disclaimer & Honesty Policy</h2>
          <p>By using OnRoadNow, you agree to the following:</p>
          <ul>
            <li>All parties must act honestly. Any theft, fraud, or misrepresentation will result in reporting to local authorities.</li>
            <li>If funds are stolen, the responsible party must reimburse the full amount plus penalties. Personal information may be forwarded to the police.</li>
            <li>Deliverers who front money for goods are entitled to repayment + 22.4% fee upon successful delivery.</li>
            <li>Misuse of location tracking or harassment will lead to permanent ban and legal action.</li>
          </ul>
          <p><strong>By clicking "I Agree", you confirm that you have read and accept this policy.</strong></p>
          <button id="acceptDisclaimer" class="btn btn-primary">I Agree</button>
        </div>
      </div>
    `;
    document.getElementById('acceptDisclaimer').onclick = () => {
      localStorage.setItem('disclaimerAccepted', 'true');
      location.reload();
    };
  } else {
    // Render the main app after auth state
    renderApp();
  }

  function renderApp() {
    const appDiv = document.getElementById('app');
    appDiv.innerHTML = `
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <h1>🏍️ OnRoadNow</h1>
        <div id="authStatus"></div>
      </div>
      <div id="authCard" class="card"></div>
      <div id="profileCard" class="card hidden"></div>
      <div class="card">
        <div class="card-header"><span>📍</span><h3>Find Stores</h3></div>
        <div id="map" style="height: 400px;"></div>
        <div id="places" class="place-list" style="margin-top: 1rem;"></div>
      </div>
      <div class="grid-2">
        <div class="card"><div class="card-header"><span>📦</span><h3>Post Request</h3></div>
          <form id="requestForm">
            <div class="form-group"><input type="text" id="storeName" placeholder="Store name" required></div>
            <div class="form-group"><input type="text" id="itemDesc" placeholder="Item description" required></div>
            <div class="form-group"><input type="number" id="itemCost" placeholder="Item cost (JMD)" required></div>
            <div class="form-group"><select id="paymentMethod" required>
              <option value="visa_mc">Visa/Mastercard</option>
              <option value="etransfer">E-Transfer</option>
              <option value="deliverer_fronts">Deliverer Fronts Cost (+22.4% fee)</option>
            </select></div>
            <button type="submit" class="btn btn-primary">Post Request</button>
          </form>
        </div>
        <div class="card"><div class="card-header"><span>📱</span><h3>Deliverer Tools</h3></div>
          <div id="delivererControls">
            <button id="startTrackingBtn" class="btn btn-primary">📍 Start Tracking (go online)</button>
            <button id="stopTrackingBtn" class="btn btn-warning hidden">🛑 Stop Tracking (offline)</button>
            <p id="trackingStatus"></p>
          </div>
          <hr>
          <div><strong>Available Deliverers:</strong> <span id="availableCount">0</span></div>
          <div id="acceptRequestSection" style="margin-top: 1rem;"></div>
        </div>
      </div>
      <div class="card"><div class="card-header"><span>📋</span><h3>Open Requests</h3></div><div id="requests"></div></div>
      <div class="card"><div class="card-header"><span>🔄</span><h3>My Active Deliveries (Customer view)</h3></div><div id="activeDeliveries"></div></div>
    `;
    // Initialize map and other functions later
    initMapAndFeatures();
  }

  // Global variables
  let map, markers = [], placeListDiv, requestForm, requestsDiv, activeDeliveriesDiv;

  function initMapAndFeatures() {
    map = L.map('map').setView([18.4655, -77.9223], 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© OSM' }).addTo(map);
    placeListDiv = document.getElementById('places');
    requestForm = document.getElementById('requestForm');
    requestsDiv = document.getElementById('requests');
    activeDeliveriesDiv = document.getElementById('activeDeliveries');

    // Nearby places
    async function fetchNearby(lat, lon) {
      const res = await fetch(`/api/nearby?lat=${lat}&lon=${lon}&radius=1000`);
      const data = await res.json();
      markers.forEach(m => map.removeLayer(m)); markers = [];
      placeListDiv.innerHTML = '';
      if (data.elements?.length) {
        data.elements.forEach(el => {
          const name = el.tags?.name || 'Unnamed';
          const latlng = [el.lat, el.lon];
          const marker = L.marker(latlng).addTo(map).bindPopup(name);
          markers.push(marker);
          const div = document.createElement('div'); div.className = 'place'; div.innerText = name;
          div.onclick = () => { document.getElementById('storeName').value = name; map.setView(latlng, 16); marker.openPopup(); };
          placeListDiv.appendChild(div);
        });
      } else placeListDiv.innerHTML = '<div style="padding:1rem;">No shops. Move map.</div>';
    }
    map.on('moveend', () => fetchNearby(map.getCenter().lat, map.getCenter().lng));
    fetchNearby(18.4655, -77.9223);

    // ---- Authentication UI ----
    const authCard = document.getElementById('authCard');
    const profileCard = document.getElementById('profileCard');
    function renderAuthUI() {
      if (currentUser) {
        authCard.innerHTML = `<div class="card-header"><span>✅</span><h3>Logged in as ${currentUser.email}</h3><button id="logoutBtn" class="btn">Logout</button></div>`;
        document.getElementById('logoutBtn').onclick = () => auth.signOut();
        profileCard.classList.remove('hidden');
        profileCard.innerHTML = `
          <div class="card-header"><span>👤</span><h3>Your Profile</h3></div>
          <p><strong>Name:</strong> ${currentUser.displayName || 'Set name'}</p>
          <p><strong>Email:</strong> ${currentUser.email}</p>
          <div class="form-group"><label>ID Number</label><input type="text" id="idNumber" placeholder="Driver's license/ID"></div>
          <div class="form-group"><label>TRN</label><input type="text" id="trn" placeholder="Tax number"></div>
          <div class="form-group"><label>Role</label><select id="role"><option value="buyer">👤 Customer</option><option value="deliverer">🛵 Deliverer</option></select></div>
          <button id="saveProfileBtn" class="btn btn-primary">Save Profile</button>
          <div id="profileMsg"></div>
        `;
        fetch(`/api/user?uid=${currentUser.uid}`).then(r=>r.json()).then(data=>{
          if(data.idNumber) document.getElementById('idNumber').value = data.idNumber;
          if(data.trn) document.getElementById('trn').value = data.trn;
          if(data.role) document.getElementById('role').value = data.role;
        });
        document.getElementById('saveProfileBtn').onclick = async () => {
          const profile = { uid: currentUser.uid, displayName: currentUser.displayName, email: currentUser.email, idNumber: document.getElementById('idNumber').value, trn: document.getElementById('trn').value, role: document.getElementById('role').value };
          await fetch('/api/user', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(profile) });
          document.getElementById('profileMsg').innerText = 'Saved!';
          location.reload(); // refresh UI
        };
        // Deliverer availability toggle
        if (document.getElementById('role').value === 'deliverer') {
          document.getElementById('delivererControls').classList.remove('hidden');
        }
      } else {
        authCard.innerHTML = `
          <div class="card-header"><span>🔐</span><h3>Login / Signup</h3></div>
          <div class="auth-tabs"><div class="tab active" id="loginTab">Login</div><div class="tab" id="signupTab">Signup</div></div>
          <div id="loginForm"><div class="form-group"><input type="email" id="loginEmail" placeholder="Email"></div><div class="form-group"><input type="password" id="loginPassword" placeholder="Password"></div><button id="emailLoginBtn" class="btn btn-primary">Login</button><button id="googleLoginBtn" class="btn">Google</button><p id="authMsg"></p></div>
          <div id="signupForm" style="display:none"><div class="form-group"><input type="text" id="signupName" placeholder="Full Name"></div><div class="form-group"><input type="email" id="signupEmail" placeholder="Email"></div><div class="form-group"><input type="password" id="signupPassword" placeholder="Password"></div><button id="emailSignupBtn" class="btn btn-primary">Signup</button><button id="googleSignupBtn" class="btn">Google</button></div>
        `;
        // attach events ...
        document.getElementById('loginTab').onclick = () => { document.getElementById('loginForm').style.display='block'; document.getElementById('signupForm').style.display='none'; };
        document.getElementById('signupTab').onclick = () => { document.getElementById('signupForm').style.display='block'; document.getElementById('loginForm').style.display='none'; };
        document.getElementById('emailLoginBtn').onclick = () => { const email=document.getElementById('loginEmail').value, pwd=document.getElementById('loginPassword').value; auth.signInWithEmailAndPassword(email,pwd).catch(e=>document.getElementById('authMsg').innerText=e.message); };
        document.getElementById('emailSignupBtn').onclick = () => { const name=document.getElementById('signupName').value, email=document.getElementById('signupEmail').value, pwd=document.getElementById('signupPassword').value; auth.createUserWithEmailAndPassword(email,pwd).then(cred=>cred.user.updateProfile({displayName:name})).catch(e=>document.getElementById('authMsg').innerText=e.message); };
        document.getElementById('googleLoginBtn').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        document.getElementById('googleSignupBtn').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        profileCard.classList.add('hidden');
      }
    }
    auth.onAuthStateChanged(user => { currentUser = user; renderAuthUI(); if (user) loadRequests(); else requestsDiv.innerHTML = ''; });
    renderAuthUI();

    // ---- Request posting ----
    requestForm.onsubmit = async (e) => {
      e.preventDefault();
      if (!currentUser) return alert('Login first');
      const storeName = document.getElementById('storeName').value;
      const itemDesc = document.getElementById('itemDesc').value;
      const itemCost = parseFloat(document.getElementById('itemCost').value);
      const paymentMethod = document.getElementById('paymentMethod').value;
      const res = await fetch('/api/requests', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ storeName, itemDesc, itemCost, paymentMethod, userId: currentUser.uid }) });
      const data = await res.json();
      alert(`Request posted #${data.id}`);
      loadRequests();
    };

    // ---- Load and display requests, with accept/loan options ----
    async function loadRequests() {
      const res = await fetch('/api/requests');
      const reqs = await res.json();
      requestsDiv.innerHTML = '';
      for (const r of reqs) {
        const div = document.createElement('div'); div.className = 'card'; div.style.marginBottom = '1rem';
        let actions = '';
        if (currentUser && r.status === 'open' && currentUser.uid !== r.userId) {
          // deliverer can accept
          actions = `<button onclick="acceptRequest(${r.id})" class="btn btn-primary">Accept this request</button>`;
          if (r.paymentMethod === 'deliverer_fronts') {
            actions += `<button onclick="offerLoan(${r.id})" class="btn btn-warning">💰 Front money for this order</button>`;
          }
        }
        div.innerHTML = `<div><strong>${r.storeName}</strong><br>${r.itemDesc}<br>Cost: JMD ${r.itemCost}<br>Payment: ${r.paymentMethod}<br>Status: ${r.status}</div><div style="margin-top:0.5rem;">${actions}</div>`;
        requestsDiv.appendChild(div);
      }
    }

    window.acceptRequest = async (requestId) => {
      if (!currentUser) return alert('Login to accept');
      const delivererId = currentUser.uid;
      const delivererName = currentUser.displayName || 'Deliverer';
      await fetch(`/api/accept?id=${requestId}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ delivererId, delivererName }) });
      alert('Request accepted. Customer notified.');
      loadRequests();
      loadActiveDeliveries();
    };

    window.offerLoan = async (requestId) => {
      if (!currentUser) return;
      const amount = prompt('Enter amount you will front (JMD):');
      if (!amount) return;
      await fetch('/api/offerLoan', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ requestId, delivererId: currentUser.uid, amountFronted: parseFloat(amount) }) });
      alert('Loan offer recorded. Customer will repay upon delivery confirmation.');
    };

    // ---- Tracking: deliverer geolocation ----
    const startBtn = document.getElementById('startTrackingBtn');
    const stopBtn = document.getElementById('stopTrackingBtn');
    const trackingStatus = document.getElementById('trackingStatus');
    if (startBtn) {
      startBtn.onclick = () => {
        if (!currentUser) return alert('Login first');
        if (!navigator.geolocation) return alert('Geolocation not supported');
        watchId = navigator.geolocation.watchPosition(async (pos) => {
          const { latitude, longitude } = pos.coords;
          await fetch('/api/updateLocation', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ delivererId: currentUser.uid, lat: latitude, lon: longitude, status: 'in_progress' }) });
          trackingStatus.innerText = `Tracking active: ${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
        }, (err) => console.error(err), { enableHighAccuracy: true, maximumAge: 5000 });
        startBtn.classList.add('hidden');
        stopBtn.classList.remove('hidden');
      };
      stopBtn.onclick = () => {
        if (watchId) navigator.geolocation.clearWatch(watchId);
        startBtn.classList.remove('hidden');
        stopBtn.classList.add('hidden');
        trackingStatus.innerText = 'Tracking stopped.';
      };
    }

    // ---- Customer view: active deliveries with location ----
    async function loadActiveDeliveries() {
      if (!currentUser) return;
      const res = await fetch('/api/requests');
      const myRequests = (await res.json()).filter(r => r.userId === currentUser.uid && (r.status === 'accepted' || r.status === 'in_progress'));
      activeDeliveriesDiv.innerHTML = '';
      for (const req of myRequests) {
        const locRes = await fetch(`/api/getLocation?requestId=${req.id}`);
        const locData = await locRes.json();
        const div = document.createElement('div'); div.className = 'card';
        div.innerHTML = `<div><strong>${req.storeName}</strong><br>Deliverer: ${req.delivererName}<br>Status: ${locData.status || 'unknown'}<br>Location: ${locData.location ? `${locData.location.lat.toFixed(5)}, ${locData.location.lon.toFixed(5)}` : 'Not yet available'}</div>
          ${locData.status === 'in_progress' ? `<button onclick="confirmDelivery(${req.id})" class="btn btn-primary">Confirm Delivery & Release Payment</button>` : ''}
        `;
        activeDeliveriesDiv.appendChild(div);
      }
    }
    window.confirmDelivery = async (requestId) => {
      await fetch('/api/confirmDelivery', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ requestId, customerId: currentUser.uid }) });
      alert('Delivery confirmed. Deliverer will be paid (including fee). Thank you for using honest service.');
      loadActiveDeliveries();
      loadRequests();
    };
    setInterval(() => { loadActiveDeliveries(); }, 5000);
    loadActiveDeliveries();
  }
</script>
</body>
</html>
