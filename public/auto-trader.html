<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnRoadNow – Auto‑Trader</title>
  <style>
    body { font-family: 'Inter', sans-serif; background: #f1f5f9; margin: 0; padding: 2rem; }
    .container { max-width: 1200px; margin: 0 auto; }
    .card { background: white; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 2rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
    .btn { display: inline-block; padding: 0.6rem 1.2rem; border-radius: 2rem; font-weight: 600; border: none; cursor: pointer; background: #2563eb; color: white; margin: 0.5rem 0; }
    .btn-outline { background: transparent; border: 1px solid #2563eb; color: #2563eb; }
    .flex { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    input, select { padding: 0.5rem 1rem; border-radius: 2rem; border: 1px solid #cbd5e1; flex: 1; }
    .log { background: #0f172a; color: #94a3b8; border-radius: 1rem; padding: 1rem; max-height: 300px; overflow-y: auto; font-family: monospace; }
    .price { font-size: 2rem; font-weight: 800; color: #facc15; }
    .nav a { margin-right: 1rem; color: #2563eb; text-decoration: none; }
    .hidden { display: none; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="container">
  <div class="nav"><a href="/">← Home</a> | <a href="/auto-trader">Auto‑Trader</a></div>
  <div id="loginSection" class="card" style="text-align: center;">
    <h1>🔐 Login Required</h1>
    <p>Please <a href="/">log in on the main page</a> first, then return here.</p>
    <button id="checkLoginBtn" class="btn">I'm already logged in</button>
  </div>
  <div id="traderSection" class="hidden">
    <h1>🤖 OnRoadNow Auto‑Trader</h1>
    <div class="flex" style="justify-content: space-between;">
      <div><strong id="userEmail"></strong></div>
      <button id="logoutBtn" class="btn btn-outline">Logout</button>
    </div>
    <div class="card">
      <h3>👤 Your Profile</h3>
      <div class="flex">
        <input type="text" id="walletAddress" placeholder="Crypto wallet address">
        <input type="text" id="paypalEmail" placeholder="PayPal email">
      </div>
      <button id="saveProfileBtn" class="btn btn-outline">Save</button>
      <div id="profileMsg"></div>
    </div>
    <div class="flex" style="gap: 1rem;">
      <div class="card" style="flex:2">
        <h3>📊 Market Data</h3>
        <select id="pairSelect">
          <option value="BTC">BTC/USD</option>
          <option value="ETH">ETH/USD</option>
          <option value="SOL">SOL/USD</option>
        </select>
        <div id="price" class="price">— USD</div>
        <canvas id="priceChart" width="400" height="200"></canvas>
      </div>
      <div class="card" style="flex:1">
        <h3>💰 Your Balance</h3>
        <div>Balance: <span id="userBalance">0.00</span> JMD</div>
        <div>Profit: <span id="userProfit">0.00</span> JMD</div>
        <div>Platform fees: <span id="ownerFees">0.00</span> JMD</div>
        <div class="flex" style="margin-top:1rem;">
          <input type="number" id="tradeAmount" placeholder="Amount (USD)">
          <button id="buyBtn" class="btn">Buy</button>
          <button id="sellBtn" class="btn">Sell</button>
        </div>
        <div class="flex" style="margin-top:1rem;">
          <input type="number" id="depositAmount" placeholder="Deposit (JMD)">
          <button id="depositBtn" class="btn">Deposit</button>
        </div>
      </div>
    </div>
    <div class="card">
      <h3>📜 Log</h3>
      <div id="logArea" class="log"></div>
    </div>
  </div>
</div>
<script>
  let currentUser = null;
  let currentPair = "BTC";
  let currentPrice = 0;
  let priceHistory = [];
  let priceChart = null;

  async function apiCall(endpoint, options = {}) {
    const res = await fetch(`/api/auto-trader/${endpoint}`, {
      ...options,
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' }
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }

  function addLog(msg, isError = false) {
    const logDiv = document.getElementById('logArea');
    const p = document.createElement('div');
    p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    if (isError) p.style.color = "#f87171";
    logDiv.appendChild(p);
    logDiv.scrollTop = logDiv.scrollHeight;
  }

  async function refreshBalance() {
    try {
      const state = await apiCall('status');
      document.getElementById('userBalance').innerText = (state.balance || 0).toFixed(2);
      document.getElementById('userProfit').innerText = (state.userProfit || 0).toFixed(2);
      document.getElementById('ownerFees').innerText = (state.ownerFees || 0).toFixed(2);
    } catch(e) { console.error(e); }
  }

  async function fetchPrice() {
    const id = { BTC: 'bitcoin', ETH: 'ethereum', SOL: 'solana' }[currentPair];
    try {
      const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${id}&vs_currencies=usd`);
      const data = await res.json();
      currentPrice = data[id]?.usd;
      if (currentPrice) {
        document.getElementById('price').innerText = `${currentPrice.toFixed(2)} USD`;
        priceHistory.push(currentPrice);
        if (priceHistory.length > 30) priceHistory.shift();
        if (priceChart) {
          priceChart.data.datasets[0].data = priceHistory;
          priceChart.update();
        } else {
          const ctx = document.getElementById('priceChart').getContext('2d');
          priceChart = new Chart(ctx, {
            type: 'line',
            data: { labels: priceHistory.map((_, i) => i), datasets: [{ label: `${currentPair}/USD`, data: priceHistory, borderColor: '#facc15', fill: false }] },
            options: { responsive: true, maintainAspectRatio: true }
          });
        }
      }
    } catch(e) { addLog(`Price error: ${e.message}`, true); }
  }

  async function reportTrade(profit, feePercent) {
    try {
      const res = await apiCall('report-profit', { method: 'POST', body: JSON.stringify({ profitJMD: profit, feePercent }) });
      if (res.error) addLog(`Error: ${res.error}`, true);
      else {
        addLog(`Trade recorded: profit ${profit.toFixed(2)} JMD → user gain ${res.userGain.toFixed(2)} JMD, owner fee ${res.fee.toFixed(2)} JMD`);
        refreshBalance();
      }
    } catch(e) { addLog(`Network error: ${e.message}`, true); }
  }

  async function simulateTrade() {
    if (!currentPrice) { addLog("Price not ready", true); return; }
    const amount = parseFloat(document.getElementById('tradeAmount').value);
    if (isNaN(amount) || amount <= 0) { addLog("Enter amount", true); return; }
    const profit = amount * (Math.random() * 0.1 + 0.02);
    const fee = 3 + Math.random() * 7;
    addLog(`Simulated trade: $${amount} → profit $${profit.toFixed(2)}`);
    await reportTrade(profit, fee);
  }

  async function deposit() {
    const amount = parseFloat(document.getElementById('depositAmount').value);
    if (isNaN(amount) || amount <= 0) return addLog("Invalid deposit amount", true);
    const res = await apiCall('add-funds', { method: 'POST', body: JSON.stringify({ amount }) });
    if (res.error) addLog(`Deposit error: ${res.error}`, true);
    else {
      addLog(`Deposited ${amount} JMD`);
      refreshBalance();
    }
  }

  async function saveProfile() {
    if (!currentUser) return;
    const wallet = document.getElementById('walletAddress').value;
    const paypal = document.getElementById('paypalEmail').value;
    const res = await fetch('/api/user', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ walletAddress: wallet, paypalEmail: paypal })
    });
    if (res.ok) document.getElementById('profileMsg').innerText = "Saved!";
    else document.getElementById('profileMsg').innerText = "Error saving";
    setTimeout(() => document.getElementById('profileMsg').innerText = "", 2000);
  }

  async function loadProfile() {
    if (!currentUser) return;
    const res = await fetch('/api/me', { credentials: 'include' });
    const data = await res.json();
    document.getElementById('walletAddress').value = data.walletAddress || '';
    document.getElementById('paypalEmail').value = data.paypalEmail || '';
  }

  function startTrading() {
    document.getElementById('pairSelect').onchange = () => { currentPair = document.getElementById('pairSelect').value; priceHistory = []; if (priceChart) priceChart.destroy(); priceChart = null; fetchPrice(); addLog(`Switched to ${currentPair}/USD`); };
    document.getElementById('buyBtn').onclick = simulateTrade;
    document.getElementById('sellBtn').onclick = simulateTrade;
    document.getElementById('depositBtn').onclick = deposit;
    document.getElementById('saveProfileBtn').onclick = saveProfile;
    fetchPrice();
    setInterval(fetchPrice, 5000);
    refreshBalance();
    addLog("Auto‑Trader ready.");
  }

  async function checkLogin() {
    const res = await fetch('/api/me', { credentials: 'include' });
    if (res.status === 401) {
      document.getElementById('loginSection').classList.remove('hidden');
      document.getElementById('traderSection').classList.add('hidden');
      return;
    }
    const user = await res.json();
    if (user.id) {
      currentUser = user;
      document.getElementById('userEmail').innerText = user.email;
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('traderSection').classList.remove('hidden');
      await loadProfile();
      startTrading();
    } else {
      document.getElementById('loginSection').classList.remove('hidden');
      document.getElementById('traderSection').classList.add('hidden');
    }
  }

  document.getElementById('checkLoginBtn').onclick = checkLogin;
  document.getElementById('logoutBtn').onclick = async () => {
    await fetch('/api/logout', { method: 'POST', credentials: 'include' });
    location.reload();
  };
  checkLogin();
</script>
</body>
</html>
