<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OnRoadNow – Auto‑Trader</title>
  <style>
    body { font-family: 'Inter', sans-serif; background: #f1f5f9; margin: 0; padding: 2rem; }
    .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 1.5rem; padding: 2rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
    h1 { color: #1e3a8a; }
    .btn { display: inline-block; padding: 0.6rem 1.2rem; border-radius: 2rem; font-weight: 600; border: none; cursor: pointer; background: #2563eb; color: white; margin: 0.5rem 0.5rem 0.5rem 0; }
    .btn-danger { background: #dc2626; }
    .btn-secondary { background: #64748b; }
    .status-card { background: #f1f5f9; border-radius: 1rem; padding: 1rem; margin: 1rem 0; }
    .balance { font-size: 1.5rem; font-weight: bold; color: #16a34a; }
    .log { background: #0f172a; color: #94a3b8; border-radius: 1rem; padding: 1rem; max-height: 300px; overflow-y: auto; font-family: monospace; margin-top: 1rem; }
    .log p { margin: 0.2rem 0; font-size: 0.8rem; }
    .hidden { display: none; }
    .nav { margin-bottom: 1rem; }
    .nav a { margin-right: 1rem; color: #2563eb; text-decoration: none; }
  </style>
</head>
<body>
<div class="container">
  <div class="nav"><a href="/">← Back to Home</a></div>
  <h1>🤖 OnRoadNow Auto‑Trader</h1>
  <p>A fee of <strong>3‑10% of profits</strong> is deducted and credited to the platform owner. Your earnings are stored per user.</p>
  <div id="authMessage"></div>
  <div id="traderControls" class="hidden">
    <div>
      <button id="startBtn" class="btn">▶️ Start Trading</button>
      <button id="stopBtn" class="btn btn-danger">⏹️ Stop Trading</button>
      <button id="testTradeBtn" class="btn btn-secondary">🧪 Test Trade (simulated profit)</button>
    </div>
    <div class="status-card">
      <strong>Status:</strong> <span id="statusText">Stopped</span><br>
      <strong>Your profit (after fees):</strong> <span id="userBalance" class="balance">0 JMD</span><br>
      <strong>Platform fees collected:</strong> <span id="ownerFees">0 JMD</span>
    </div>
    <div class="log" id="logArea"></div>
  </div>
</div>
<script>
  async function apiCall(endpoint, options = {}) {
    const res = await fetch(`/api/auto-trader/${endpoint}`, {
      ...options,
      credentials: 'include',
      headers: { 'Content-Type': 'application/json', ...options.headers }
    });
    if (res.status === 401) {
      window.location.href = '/';
      throw new Error('Unauthorized');
    }
    return res.json();
  }

  let tradingInterval = null;

  function addLog(msg) {
    const logDiv = document.getElementById('logArea');
    const p = document.createElement('p');
    p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logDiv.appendChild(p);
    logDiv.scrollTop = logDiv.scrollHeight;
  }

  async function refreshStatus() {
    try {
      const state = await apiCall('status');
      document.getElementById('statusText').innerText = state.running ? 'Active' : 'Stopped';
      document.getElementById('userBalance').innerText = (state.userProfit || 0).toFixed(2) + ' JMD';
      document.getElementById('ownerFees').innerText = (state.ownerFees || 0).toFixed(2) + ' JMD';
    } catch (err) {
      console.error(err);
    }
  }

  async function reportProfit(profitJMD, feePercent) {
    addLog(`📊 Reporting profit: ${profitJMD.toFixed(2)} JMD, fee ${feePercent.toFixed(1)}%`);
    try {
      const res = await apiCall('report-profit', {
        method: 'POST',
        body: JSON.stringify({ profitJMD, feePercent })
      });
      if (res.error) {
        addLog(`❌ Error: ${res.error}`);
      } else {
        addLog(`✅ Trade recorded: user gain ${res.userGain.toFixed(2)} JMD, owner fee ${res.fee.toFixed(2)} JMD`);
        refreshStatus();
      }
    } catch (err) {
      addLog(`❌ Network error: ${err.message}`);
    }
  }

  async function simulateTrade() {
    const profit = 10 + Math.random() * 90;
    const fee = 3 + Math.random() * 7;
    addLog(`📈 Trade executed: profit ${profit.toFixed(2)} JMD, fee ${fee.toFixed(1)}%`);
    await reportProfit(profit, fee);
  }

  async function startTrading() {
    if (tradingInterval) clearInterval(tradingInterval);
    await apiCall('start', { method: 'POST' });
    addLog('🚀 Auto‑Trader started (simulated trade every 30 seconds)');
    tradingInterval = setInterval(simulateTrade, 30000);
    refreshStatus();
  }

  async function stopTrading() {
    if (tradingInterval) clearInterval(tradingInterval);
    tradingInterval = null;
    await apiCall('stop', { method: 'POST' });
    addLog('⏹️ Auto‑Trader stopped');
    refreshStatus();
  }

  async function testTrade() {
    await simulateTrade();
  }

  async function init() {
    // Check if user is authenticated by calling /api/me
    const meRes = await fetch('/api/me', { credentials: 'include' });
    const user = await meRes.json();
    if (!user.id) {
      document.getElementById('authMessage').innerHTML = '<div class="status-card">🔐 You must <a href="/">log in</a> to use the Auto‑Trader.</div>';
      return;
    }
    document.getElementById('authMessage').innerHTML = `<div class="status-card">✅ Logged in as <strong>${user.email}</strong></div>`;
    document.getElementById('traderControls').classList.remove('hidden');

    // Load initial status
    await refreshStatus();

    // Attach event listeners
    document.getElementById('startBtn').onclick = startTrading;
    document.getElementById('stopBtn').onclick = stopTrading;
    document.getElementById('testTradeBtn').onclick = testTrade;
  }

  init();
</script>
</body>
</html>
