<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Auto-Trader Login Test</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<h2>Auto-Trader Login Test</h2>
<div id="loginCard">
  <div id="g_id_onload"
       data-client_id="134628093591-61nk4mneo6d1o6of5da3e3fijgtd5dd0.apps.googleusercontent.com"
       data-callback="handleGoogleCredential"
       data-auto_prompt="false">
  </div>
  <div class="g_id_signin" data-type="standard" data-size="large"></div>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button id="loginBtn">Login</button>
  <button id="signupBtn">Signup</button>
  <div id="result"></div>
</div>
<div id="dashboard" style="display:none;">
  <h3>Logged in as <span id="userEmail"></span></h3>
  <button id="logout">Logout</button>
  <p>✅ Authentication works! Trading interface will appear here.</p>
</div>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBrldf3h28e9_Dwjrp2zZL21EJzxp_1MSk",
    authDomain: "onroadnow-3aabb.firebaseapp.com",
    projectId: "onroadnow-3aabb",
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  window.handleGoogleCredential = (response) => {
    const credential = firebase.auth.GoogleAuthProvider.credential(response.credential);
    auth.signInWithCredential(credential).catch(err => alert(err.message));
  };

  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById('loginCard').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('userEmail').innerText = user.email;
    } else {
      document.getElementById('loginCard').style.display = 'block';
      document.getElementById('dashboard').style.display = 'none';
    }
  });

  document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('email').value;
    const pwd = document.getElementById('password').value;
    try {
      await auth.signInWithEmailAndPassword(email, pwd);
    } catch(e) { document.getElementById('result').innerText = e.message; }
  };
  document.getElementById('signupBtn').onclick = async () => {
    const email = document.getElementById('email').value;
    const pwd = document.getElementById('password').value;
    try {
      await auth.createUserWithEmailAndPassword(email, pwd);
    } catch(e) { document.getElementById('result').innerText = e.message; }
  };
  document.getElementById('logout').onclick = () => auth.signOut();
</script>
</body>
</html>
