<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnRoadNow – Auto‑Trader</title>
  <style>
    body { font-family: 'Inter', sans-serif; background: #f8fafc; margin: 0; padding: 2rem; }
    .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 1.5rem; padding: 2rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
    h1 { color: #1e3a8a; margin-bottom: 0.5rem; }
    .btn { display: inline-block; padding: 0.6rem 1.2rem; border-radius: 2rem; font-weight: 600; border: none; cursor: pointer; background: #2563eb; color: white; margin: 0.5rem 0.5rem 0.5rem 0; }
    .btn-danger { background: #dc2626; }
    .btn-secondary { background: #64748b; }
    .status-card { background: #f1f5f9; border-radius: 1rem; padding: 1rem; margin: 1rem 0; }
    .balance { font-size: 1.4rem; font-weight: bold; color: #16a34a; }
    .log { background: #1e293b; color: #94a3b8; border-radius: 1rem; padding: 1rem; font-family: monospace; max-height: 300px; overflow-y: auto; margin-top: 1rem; }
    .log p { margin: 0.2rem 0; font-size: 0.8rem; }
    .hidden { display: none; }
    .nav { margin-bottom: 2rem; }
    .nav a { margin-right: 1rem; text-decoration: none; color: #2563eb; }
  </style>
</head>
<body>
<div class="container">
  <div class="nav"><a href="/">← Back to Home</a></div>
  <h1>🤖 OnRoadNow Auto‑Trader</h1>
  <p>Automated trading bot that runs in your browser. A fee of <strong>3‑10% of profits</strong> is deducted and credited to the platform owner. Your earnings are stored per user.</p>
  <div id="authMessage"></div>
  <div id="traderControls" class="hidden">
    <button id="startBtn" class="btn">▶️ Start Trading</button>
    <button id="stopBtn" class="btn btn-danger">⏹️ Stop Trading</button>
    <button id="testTradeBtn" class="btn btn-secondary">🧪 Test Trade (report profit)</button>
    <div class="status-card">
      <strong>Status:</strong> <span id="statusText">Stopped</span><br>
      <strong>Your total profit (after fees):</strong> <span id="userBalance" class="balance">0 JMD</span><br>
      <strong>Platform fees earned (for owner):</strong> <span id="ownerFees">0 JMD</span>
    </div>
    <div class="log" id="logArea"></div>
  </div>
</div>
<script>
  async function apiCall(url, options = {}) {
    const res = await fetch(url, { ...options, credentials: 'include', headers: { 'Content-Type': 'application/json', ...options.headers } });
    return res.json();
  }

  let tradingInterval = null;

  function addLog(msg) {
    const logDiv = document.getElementById('logArea');
    const p = document.createElement('p');
    p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logDiv.appendChild(p);
    logDiv.scrollTop = logDiv.scrollHeight;
  }

  async function reportProfit(profitJMD, feePercent) {
    try {
      addLog(`📊 Reporting profit: ${profitJMD.toFixed(2)} JMD with fee ${feePercent.toFixed(1)}%`);
      const res = await apiCall('/api/auto-trader/report-profit', {
        method: 'POST',
        body: JSON.stringify({ profitJMD, feePercent })
      });
      if (res.error) {
        addLog(`❌ Error: ${res.error}`);
      } else {
        addLog(`✅ Trade recorded: user gain ${res.userGain.toFixed(2)} JMD, owner fee ${res.fee.toFixed(2)} JMD`);
        document.getElementById('userBalance').innerText = (res.newUserBalance || 0).toFixed(2) + ' JMD';
        document.getElementById('ownerFees').innerText = (res.newOwnerFees || 0).toFixed(2) + ' JMD';
      }
    } catch (err) {
      addLog(`❌ Network error: ${err.message}`);
    }
  }

  async function simulateTrade() {
    // Example: random profit between 10 and 100 JMD
    const profit = 10 + Math.random() * 90;
    const fee = 3 + Math.random() * 7;
    addLog(`📈 Trade executed: profit ${profit.toFixed(2)} JMD, fee ${fee.toFixed(1)}%`);
    await reportProfit(profit, fee);
  }

  async function startTrading() {
    if (tradingInterval) clearInterval(tradingInterval);
    const res = await apiCall('/api/auto-trader/start', { method: 'POST' });
    if (res.error) {
      addLog(`❌ Cannot start: ${res.error}`);
      return;
    }
    addLog('🚀 Auto‑Trader started (simulated trade every 30 seconds)');
    tradingInterval = setInterval(simulateTrade, 30000);
    await refreshStatus();
  }

  async function stopTrading() {
    if (tradingInterval) {
      clearInterval(tradingInterval);
      tradingInterval = null;
    }
    await apiCall('/api/auto-trader/stop', { method: 'POST' });
    addLog('⏹️ Auto‑Trader stopped');
    await refreshStatus();
  }

  async function refreshStatus() {
    const state = await apiCall('/api/auto-trader/status');
    if (state) {
      document.getElementById('statusText').innerText = state.running ? 'Active' : 'Stopped';
      document.getElementById('userBalance').innerText = (state.userProfit || 0).toFixed(2) + ' JMD';
      document.getElementById('ownerFees').innerText = (state.ownerFees || 0).toFixed(2) + ' JMD';
      if (state.log && state.log.length) {
        const logDiv = document.getElementById('logArea');
        logDiv.innerHTML = '';
        state.log.slice().reverse().forEach(msg => {
          const p = document.createElement('p');
          p.textContent = msg;
          logDiv.appendChild(p);
        });
      }
    }
  }

  async function init() {
    // Check authentication
    const user = await apiCall('/api/me');
    if (!user.id) {
      document.getElementById('authMessage').innerHTML = '<div class="status-card">🔐 You must <a href="/">log in</a> to use the Auto‑Trader.</div>';
      return;
    }
    document.getElementById('authMessage').innerHTML = `<div class="status-card">✅ Logged in as <strong>${user.email}</strong></div>`;
    document.getElementById('traderControls').classList.remove('hidden');

    await refreshStatus();

    document.getElementById('startBtn').onclick = startTrading;
    document.getElementById('stopBtn').onclick = stopTrading;
    document.getElementById('testTradeBtn').onclick = async () => {
      const profit = 50;
      const fee = 5;
      await reportProfit(profit, fee);
      await refreshStatus();
    };
  }

  init();
</script>
</body>
</html>
