<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto-Trader</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; padding: 1rem; }
    .container { max-width: 1200px; margin: auto; }
    .card { background: #1e293b; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1.5rem; }
    .flex { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
    .btn { background: #3b82f6; border: none; padding: 0.5rem 1.2rem; border-radius: 2rem; color: white; font-weight: 600; cursor: pointer; }
    .btn-success { background: #10b981; }
    .btn-danger { background: #ef4444; }
    .log { background: #0f172a; border-radius: 1rem; padding: 1rem; max-height: 300px; overflow-y: auto; font-family: monospace; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div style="display:flex;gap:1.2rem;flex-wrap:wrap;margin-bottom:2rem;font-size:1.2rem;">
    <a href="/micro-login" style="color:#60a5fa;text-decoration:none;font-weight:600;">🔐 Login</a>
    <a href="/micro-dashboard" style="color:#60a5fa;text-decoration:none;font-weight:600;">📊 Dashboard</a>
    <a href="/micro-teller" style="color:#60a5fa;text-decoration:none;font-weight:600;">🧾 Teller</a>
    <a href="/micro-trade" style="color:#60a5fa;text-decoration:none;font-weight:600;">📈 Trade</a>
  </div>
<div class="container">
  <div style="display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 2rem;">
    <a href="/" style="color: #2563eb;">🏠 Home</a>
    <a href="/auto-trader" style="color: #2563eb;">🤖 Auto‑Trader</a>
    <a href="/stock-trader" style="color: #2563eb;">📈 Stocks</a>
    <a href="/claimer" style="color: #2563eb;">💰 Claim</a>
    <a href="/referral" style="color: #2563eb;">👥 Referrals</a>
    <a href="/roundup" style="color: #2563eb;">🪙 Round‑Up</a>
    <a href="/receipt-invest" style="color: #2563eb;">🧾 Receipt</a>
    <a href="/history" style="color: #2563eb;">📜 History</a>
    <a href="/features" style="color:#60a5fa;text-decoration:none;font-weight:600;">✨ All Features</a>
    <a href="/store-dashboard" style="color:#60a5fa;text-decoration:none;font-weight:600;">📊 Store</a>
    <a href="/customer-portal" style="color:#60a5fa;text-decoration:none;font-weight:600;">👤 Portal</a>
  </div>

  <div class="card">
    <h2>🤖 AI Auto-Trader</h2>
    <p>Trade with AI signals – only buys when stocks are expected to rise.</p>
    <div class="flex">
      <button id="startBot" class="btn btn-success">▶️ Start Bot</button>
      <button id="stopBot" class="btn btn-danger">⏹️ Stop Bot</button>
      <span id="status">Status: Stopped</span>
    </div>
    <div id="profitDisplay" style="margin:1rem 0;">Profit: $0.00</div>
    <div style="height: 300px;"><canvas id="priceChart"></canvas></div>
    <div id="log" class="log">Ready.</div>
  </div>
</div>
<script>
  let chart = null;
  async function apiCall(endpoint, options = {}) {
    const res = await fetch(`/api/${endpoint}`, { ...options, credentials: 'include', headers: { 'Content-Type': 'application/json' } });
    return res.json();
  }
  function addLog(msg) {
    const logDiv = document.getElementById('log');
    const p = document.createElement('div');
    p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logDiv.appendChild(p);
    logDiv.scrollTop = logDiv.scrollHeight;
  }
  async function updateStatus() {
    const data = await apiCall('bot/status', { method: 'GET' });
    document.getElementById('status').textContent = data.running ? '🟢 Running' : '🔴 Stopped';
    document.getElementById('profitDisplay').textContent = `Profit: $${(data.profit || 0).toFixed(2)}`;
    if (data.log && data.log.length) {
      data.log.forEach(msg => addLog(msg));
    }
  }
  document.getElementById('startBot').onclick = async () => {
    const data = await apiCall('bot/control', { method: 'POST', body: JSON.stringify({ action: 'start' }) });
    if (data.error) addLog('❌ ' + data.error);
    else { addLog('✅ Bot started'); updateStatus(); }
  };
  document.getElementById('stopBot').onclick = async () => {
    const data = await apiCall('bot/control', { method: 'POST', body: JSON.stringify({ action: 'stop' }) });
    if (data.error) addLog('❌ ' + data.error);
    else { addLog('⏹️ Bot stopped'); updateStatus(); }
  };
  // Chart placeholder – simulate live price
  function initChart() {
    const ctx = document.getElementById('priceChart').getContext('2d');
    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: Array(20).fill(''),
        datasets: [{
          label: 'Price (USD)',
          data: Array(20).fill(100).map(() => 100 + Math.random() * 10 - 5),
          borderColor: '#3b82f6',
          fill: false
        }]
      },
      options: { responsive: true, maintainAspectRatio: false }
    });
    setInterval(() => {
      if (chart) {
        const newVal = chart.data.datasets[0].data[chart.data.datasets[0].data.length-1] + (Math.random() * 2 - 1);
        chart.data.datasets[0].data.push(newVal);
        chart.data.datasets[0].data.shift();
        chart.update();
      }
    }, 3000);
  }
  updateStatus();
  initChart();
</script>
  <button id="depositBtn" class="btn" style="background:#f7931a;font-size:1.2rem;padding:0.8rem 2rem;">💰 Deposit</button>
  <script>
  document.getElementById("depositBtn")?.addEventListener("click", async function() {
    const res = await fetch("/api/deposit", { credentials: "include" });
    const data = await res.json();
    if (data.url) window.open(data.url, "_blank");
    else alert("Deposit URL not set.");
  });
  </script>
</body>
</html>
