<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OnRoadNow – Auto‑Trader</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 2rem auto; padding: 1rem; background: #f4f4f4; }
    .card { background: white; border-radius: 1rem; padding: 1rem; margin-bottom: 1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    button { background: #2563eb; color: white; border: none; padding: 0.5rem 1rem; border-radius: 2rem; cursor: pointer; }
    input { padding: 0.5rem; width: 100%; margin: 0.5rem 0; border-radius: 0.5rem; border: 1px solid #ccc; }
    .log { background: #1e293b; color: #94a3b8; padding: 1rem; border-radius: 0.5rem; max-height: 300px; overflow-y: auto; font-family: monospace; }
  </style>
</head>
<body>
<h1>🤖 Auto‑Trader</h1>
<div id="auth"></div>
<div id="trader" style="display:none;">
  <div class="card">
    <h3>Your Stats</h3>
    <div>Profit: $<span id="userProfit">0</span></div>
    <div>Platform fees: $<span id="ownerFees">0</span></div>
    <input type="number" id="amount" placeholder="Trade amount (USD)">
    <button id="buyBtn">Buy (simulate profit)</button>
    <button id="sellBtn">Sell (simulate profit)</button>
  </div>
  <div class="card">
    <h3>Log</h3>
    <div id="log" class="log"></div>
  </div>
</div>
<script>
  async function apiCall(endpoint, options = {}) {
    const res = await fetch(`/api/auto-trader/${endpoint}`, {
      ...options,
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' }
    });
    return res.json();
  }

  async function refresh() {
    const state = await apiCall('status');
    document.getElementById('userProfit').innerText = (state.userProfit || 0).toFixed(2);
    document.getElementById('ownerFees').innerText = (state.ownerFees || 0).toFixed(2);
  }

  function addLog(msg) {
    const logDiv = document.getElementById('log');
    const p = document.createElement('div');
    p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logDiv.appendChild(p);
    logDiv.scrollTop = logDiv.scrollHeight;
  }

  async function trade() {
    const usd = parseFloat(document.getElementById('amount').value);
    if (isNaN(usd) || usd <= 0) {
      addLog("Invalid amount");
      return;
    }
    const profit = usd * (Math.random() * 0.1 + 0.02);
    const fee = 3 + Math.random() * 7;
    addLog(`Trade: amount $${usd}, profit $${profit.toFixed(2)}, fee ${fee.toFixed(1)}%`);
    const res = await apiCall('report-profit', {
      method: 'POST',
      body: JSON.stringify({ profitJMD: profit, feePercent: fee })
    });
    if (res.error) addLog(`Error: ${res.error}`);
    else addLog(`✅ Recorded: user gain $${res.userGain.toFixed(2)}, owner fee $${res.fee.toFixed(2)}`);
    refresh();
  }

  // Check authentication first
  (async () => {
    const me = await fetch('/api/me', { credentials: 'include' }).then(r => r.json());
    if (!me.id) {
      document.getElementById('auth').innerHTML = '<div class="card">🔐 Please <a href="/">log in</a> first.</div>';
      return;
    }
    document.getElementById('auth').innerHTML = `<div class="card">✅ Logged in as ${me.email}</div>`;
    document.getElementById('trader').style.display = 'block';
    refresh();
    document.getElementById('buyBtn').onclick = trade;
    document.getElementById('sellBtn').onclick = trade;
  })();
</script>
</body>
</html>
