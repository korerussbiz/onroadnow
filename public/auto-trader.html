<!DOCTYPE html>
<html>
<head><title>OnRoadNow Auto‑Trader</title>
<style>
body { font-family: sans-serif; margin: 2rem; }
button { padding: 0.5rem 1rem; margin: 0.5rem; }
pre { background: #f4f4f4; padding: 1rem; }
</style>
</head>
<body>
<h1>🤖 Auto‑Trader (Simulator)</h1>
<p>Profit fee: 3‑10% goes to platform owner.</p>
<div>
  <button id="startBtn">▶ Start Trading</button>
  <button id="stopBtn">⏹ Stop Trading</button>
  <button id="testBtn">🧪 Test Trade (report profit)</button>
</div>
<div>
  <h3>Status</h3>
  <pre id="status">Not started</pre>
  <h3>Log</h3>
  <pre id="log"></pre>
</div>
<script>
  let interval = null;
  const logDiv = document.getElementById('log');
  const statusDiv = document.getElementById('status');

  function addLog(msg) {
    const p = document.createElement('div');
    p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logDiv.appendChild(p);
    logDiv.scrollTop = logDiv.scrollHeight;
  }

  async function apiCall(endpoint, data = null) {
    const options = { method: data ? 'POST' : 'GET', headers: { 'Content-Type': 'application/json' }, credentials: 'include' };
    if (data) options.body = JSON.stringify(data);
    const res = await fetch(`/api/auto-trader/${endpoint}`, options);
    return await res.json();
  }

  async function reportProfit(profit, feePercent) {
    addLog(`Reporting profit: JMD ${profit}, fee ${feePercent}%`);
    const result = await apiCall('report-profit', { profitJMD: profit, feePercent });
    addLog(`Result: user gain ${result.userGain}, owner fee ${result.fee}`);
    // update status
    const state = await apiCall('status');
    statusDiv.innerText = JSON.stringify(state, null, 2);
  }

  async function simulateTrade() {
    const profit = 10 + Math.random() * 90;
    const fee = 3 + Math.random() * 7;
    await reportProfit(profit, fee);
  }

  async function startTrading() {
    if (interval) clearInterval(interval);
    await apiCall('start');
    addLog('Trading started (simulated every 30 seconds)');
    interval = setInterval(simulateTrade, 30000);
    const state = await apiCall('status');
    statusDiv.innerText = JSON.stringify(state, null, 2);
  }

  async function stopTrading() {
    if (interval) clearInterval(interval);
    interval = null;
    await apiCall('stop');
    addLog('Trading stopped');
    const state = await apiCall('status');
    statusDiv.innerText = JSON.stringify(state, null, 2);
  }

  async function testTrade() {
    await simulateTrade();
  }

  document.getElementById('startBtn').onclick = startTrading;
  document.getElementById('stopBtn').onclick = stopTrading;
  document.getElementById('testBtn').onclick = testTrade;

  // initial status
  (async () => {
    const state = await apiCall('status');
    statusDiv.innerText = JSON.stringify(state, null, 2);
  })();
</script>
</body>
</html>
