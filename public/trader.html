<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OnRoadNow – Micro Trading Bot</title>
  <style>
    body { font-family: Arial; background: #0f172a; color: #e2e8f0; padding: 2rem; }
    .card { background: #1e293b; border-radius: 1rem; padding: 1.5rem; margin-bottom: 1.5rem; }
    button { background: #3b82f6; border: none; padding: 0.5rem 1rem; border-radius: 2rem; color: white; cursor: pointer; margin: 0.5rem; }
    input { padding: 0.5rem; border-radius: 1rem; border: none; margin: 0.5rem; }
    .price { font-size: 2rem; color: #facc15; }
    .log { background: #0f172a; padding: 1rem; border-radius: 1rem; max-height: 300px; overflow-y: auto; font-family: monospace; }
  </style>
</head>
<body>
<div class="card">
  <h1>🤖 Micro Trading Bot (Demo)</h1>
  <p>Virtual wallet – no real money. Live price feeds from CoinGecko.</p>
  <div id="status">Loading price...</div>
  <div class="price" id="price">—</div>
  <div>
    <label>Pair:</label>
    <select id="pair">
      <option value="bitcoin">BTC/USD</option>
      <option value="ethereum">ETH/USD</option>
      <option value="solana">SOL/USD</option>
    </select>
  </div>
  <div>
    <input type="number" id="amount" placeholder="Amount (USD)" step="any">
    <button id="buyBtn">Buy</button>
    <button id="sellBtn">Sell</button>
  </div>
  <div>💰 USD: <span id="usd">10000.00</span></div>
  <div id="cryptoBalance">₿ BTC: 0.0000</div>
  <div class="log" id="log"></div>
</div>
<script>
  let wallet = { USD: 10000, BTC: 0, ETH: 0, SOL: 0 };
  let currentPrice = 0;
  let currentPair = 'bitcoin';

  function addLog(msg) {
    const logDiv = document.getElementById('log');
    const p = document.createElement('div');
    p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logDiv.appendChild(p);
    logDiv.scrollTop = logDiv.scrollHeight;
  }

  async function fetchPrice() {
    try {
      const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${currentPair}&vs_currencies=usd`);
      const data = await res.json();
      currentPrice = data[currentPair]?.usd;
      if (currentPrice) {
        document.getElementById('price').innerText = `$${currentPrice.toFixed(2)}`;
        document.getElementById('status').innerHTML = '✅ Live price';
      } else {
        document.getElementById('status').innerHTML = '⚠️ Price error';
      }
    } catch (err) {
      document.getElementById('status').innerHTML = '❌ Network error';
    }
  }

  function updateUI() {
    document.getElementById('usd').innerText = wallet.USD.toFixed(2);
    if (currentPair === 'bitcoin') document.getElementById('cryptoBalance').innerHTML = `₿ BTC: ${wallet.BTC.toFixed(8)}`;
    else if (currentPair === 'ethereum') document.getElementById('cryptoBalance').innerHTML = `⟠ ETH: ${wallet.ETH.toFixed(6)}`;
    else document.getElementById('cryptoBalance').innerHTML = `◎ SOL: ${wallet.SOL.toFixed(4)}`;
  }

  async function executeTrade(type, usdAmount) {
    if (!currentPrice) { addLog('❌ Price not loaded'); return; }
    const cryptoAmount = usdAmount / currentPrice;
    if (type === 'buy') {
      if (wallet.USD < usdAmount) { addLog(`❌ Insufficient USD`); return; }
      wallet.USD -= usdAmount;
      if (currentPair === 'bitcoin') wallet.BTC += cryptoAmount;
      else if (currentPair === 'ethereum') wallet.ETH += cryptoAmount;
      else wallet.SOL += cryptoAmount;
      addLog(`✅ Bought ${cryptoAmount.toFixed(8)} ${currentPair.toUpperCase()} for $${usdAmount.toFixed(2)}`);
    } else {
      let balance = 0;
      if (currentPair === 'bitcoin') balance = wallet.BTC;
      else if (currentPair === 'ethereum') balance = wallet.ETH;
      else balance = wallet.SOL;
      if (balance < cryptoAmount) { addLog(`❌ Insufficient ${currentPair.toUpperCase()}`); return; }
      if (currentPair === 'bitcoin') wallet.BTC -= cryptoAmount;
      else if (currentPair === 'ethereum') wallet.ETH -= cryptoAmount;
      else wallet.SOL -= cryptoAmount;
      wallet.USD += usdAmount;
      addLog(`✅ Sold ${cryptoAmount.toFixed(8)} ${currentPair.toUpperCase()} for $${usdAmount.toFixed(2)}`);
    }
    updateUI();
  }

  document.getElementById('buyBtn').onclick = () => {
    const amount = parseFloat(document.getElementById('amount').value);
    if (isNaN(amount) || amount <= 0) return addLog('❌ Invalid amount');
    executeTrade('buy', amount);
  };
  document.getElementById('sellBtn').onclick = () => {
    const amount = parseFloat(document.getElementById('amount').value);
    if (isNaN(amount) || amount <= 0) return addLog('❌ Invalid amount');
    executeTrade('sell', amount);
  };
  document.getElementById('pair').onchange = (e) => {
    currentPair = e.target.value;
    fetchPrice();
    updateUI();
  };

  fetchPrice();
  setInterval(fetchPrice, 10000);
  updateUI();
  addLog('🚀 Bot ready – use Buy/Sell to simulate trades.');
</script>
</body>
</html>
