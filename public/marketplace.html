<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnRoadNow – Marketplace</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 2rem; }
    .container { max-width: 1200px; margin: 0 auto; }
    .card { background: white; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 2rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
    h1 { color: #1e3a8a; margin-bottom: 0.5rem; }
    .flex { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; justify-content: space-between; }
    .btn { display: inline-block; padding: 0.6rem 1.2rem; border-radius: 2rem; font-weight: 600; border: none; cursor: pointer; background: #2563eb; color: white; text-decoration: none; transition: 0.2s; }
    .btn-outline { background: transparent; border: 1px solid #2563eb; color: #2563eb; }
    .listing-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 1.5rem; }
    .listing-card { background: white; border-radius: 1rem; border: 1px solid #e2e8f0; overflow: hidden; transition: 0.2s; }
    .listing-card:hover { box-shadow: 0 20px 25px -12px rgba(0,0,0,0.1); transform: translateY(-2px); }
    .listing-card .content { padding: 1.2rem; }
    .listing-card h3 { font-size: 1.2rem; margin-bottom: 0.5rem; }
    .price { font-size: 1.5rem; font-weight: 800; color: #16a34a; margin: 0.5rem 0; }
    .fee { font-size: 0.7rem; color: #64748b; }
    .seller { font-size: 0.8rem; color: #475569; margin-top: 0.5rem; }
    .nav { margin-bottom: 1.5rem; }
    .nav a { margin-right: 1rem; text-decoration: none; color: #2563eb; }
    .empty-state { text-align: center; padding: 3rem; color: #64748b; }
  </style>
</head>
<body>
<div class="container">
  <div class="nav">
    <a href="/">🏠 Home</a>
    <a href="/auto-trader">🤖 Auto‑Trader</a>
  </div>
  <div class="flex">
    <h1>🛒 Marketplace</h1>
    <a href="/" class="btn btn-outline">➕ Post a new item (in Member Dashboard)</a>
  </div>
  <div id="listingsContainer" class="card">
    <div style="text-align:center; padding:2rem;">Loading listings...</div>
  </div>
</div>
<script>
  async function apiCall(url, options = {}) {
    const res = await fetch(url, {
      ...options,
      credentials: 'include',
      headers: { 'Content-Type': 'application/json', ...options.headers }
    });
    return res.json();
  }

  async function loadListings() {
    const container = document.getElementById('listingsContainer');
    try {
      const listings = await apiCall('/api/listings');
      if (!listings || listings.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-box-open" style="font-size: 3rem; margin-bottom: 1rem;"></i>
            <h3>No items for sale yet</h3>
            <p>Be the first to sell something! Log in and go to your dashboard → Marketplace tab to post an item.</p>
            <a href="/" class="btn">Go to Dashboard</a>
          </div>
        `;
        return;
      }
      // Build grid
      let html = `<div class="listing-grid">`;
      listings.forEach(item => {
        html += `
          <div class="listing-card">
            <div class="content">
              <h3>${escapeHtml(item.title)}</h3>
              <p>${escapeHtml(item.description)}</p>
              <div class="price">JMD ${item.price}</div>
              <div class="fee">Listing fee: ${item.feePercent}%</div>
              <div class="seller">Seller: ${item.sellerId?.slice(0,8)}...</div>
              <button class="btn buy-btn" data-id="${item.id}" style="margin-top: 1rem; width: 100%;">Buy Now</button>
            </div>
          </div>
        `;
      });
      html += `</div>`;
      container.innerHTML = html;

      // Attach buy event listeners
      document.querySelectorAll('.buy-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const listingId = btn.dataset.id;
          const user = await apiCall('/api/me');
          if (!user.id) {
            alert('Please login to buy');
            window.location.href = '/';
            return;
          }
          const res = await apiCall('/api/purchase', {
            method: 'POST',
            body: JSON.stringify({ listingId })
          });
          if (res.error) alert('Error: ' + res.error);
          else {
            alert('Purchase recorded! You will be contacted by the seller.');
            loadListings(); // refresh to remove sold item
          }
        });
      });
    } catch (err) {
      container.innerHTML = `<div class="empty-state">❌ Error loading listings: ${err.message}</div>`;
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }

  loadListings();
</script>
  <button id="depositBtn" class="btn" style="background:#f7931a;font-size:1.2rem;padding:0.8rem 2rem;">💰 Deposit</button>
  <script>
  document.getElementById("depositBtn")?.addEventListener("click", async function() {
    const res = await fetch("/api/deposit", { credentials: "include" });
    const data = await res.json();
    if (data.url) window.open(data.url, "_blank");
    else alert("Deposit URL not set.");
  });
  </script>
</body>
</html>
