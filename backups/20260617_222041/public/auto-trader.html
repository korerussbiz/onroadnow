<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnRoadNow – Auto‑Trader</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; padding: 1rem; }
    .container { max-width: 1200px; margin: 0 auto; }
    .card { background: #1e293b; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1.5rem; }
    .btn { background: #3b82f6; border: none; padding: 0.5rem 1.2rem; border-radius: 2rem; color: white; font-weight: 600; cursor: pointer; margin-right: 0.5rem; }
    .btn-buy { background: #10b981; }
    .btn-sell { background: #ef4444; }
    input { background: #0f172a; border: 1px solid #334155; color: white; padding: 0.5rem 1rem; border-radius: 2rem; width: 150px; margin-right: 0.5rem; }
    .flex { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
    .log { background: #0f172a; border-radius: 1rem; padding: 1rem; max-height: 250px; overflow-y: auto; font-family: monospace; margin-top: 1rem; }
    .nav { margin-bottom: 1rem; }
    .nav a { color: #94a3b8; text-decoration: none; margin-right: 1rem; }
    .nav a:hover { color: #facc15; }
  </style>
</head>
<body>
<div class="container">
  <div class="nav">
    <a href="/">Home</a> | <a href="/auto-trader">Auto‑Trader</a> | <a href="/claimer">Claim Bot</a>
  </div>
  <div id="authMessage"></div>
  <div id="traderContent" style="display: none;">
    <div class="card">
      <h3>💼 Your Balance</h3>
      <div>💰 Wallet balance: <span id="walletBalance">0.00</span> USD</div>
      <div>📈 Trading profit: <span id="userProfit">0.00</span> USD</div>
      <div>🏦 Platform fees: <span id="ownerFees">0.00</span> USD</div>
    </div>
    <div class="card">
      <h3>💰 Deposit / Withdraw</h3>
      <div class="flex">
        <input type="number" id="depositAmount" placeholder="Amount (USD)">
        <button id="depositBtn" class="btn">Deposit</button>
        <input type="number" id="withdrawAmount" placeholder="Amount (USD)">
        <button id="withdrawBtn" class="btn">Withdraw</button>
      </div>
      <button id="connectWalletBtn" class="btn" style="background:#6b21a5;">🔗 Connect Wallet (demo)</button>
      <div id="walletStatus" style="margin-top:0.5rem;"></div>
    </div>
    <div class="card">
      <h3>📊 Trade Simulator</h3>
      <div class="flex">
        <input type="number" id="tradeAmount" placeholder="Amount (USD)">
        <button id="buyBtn" class="btn btn-buy">Buy (simulate profit)</button>
        <button id="sellBtn" class="btn btn-sell">Sell (simulate profit)</button>
      </div>
    </div>
    <div class="card">
      <h3>📜 Log</h3>
      <div id="log" class="log"></div>
    </div>
  </div>
</div>
<script>
  let currentUser = null;
  let balance = 0; // will be loaded from backend
  let userProfit = 0;
  let ownerFees = 0;

  async function apiCall(endpoint, options = {}) {
    const res = await fetch(`/api/auto-trader/${endpoint}`, {
      ...options,
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' }
    });
    return res.json();
  }

  function addLog(msg) {
    const logDiv = document.getElementById('log');
    const p = document.createElement('div');
    p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logDiv.appendChild(p);
    logDiv.scrollTop = logDiv.scrollHeight;
  }

  async function refreshBalance() {
    const state = await apiCall('status');
    userProfit = state.userProfit || 0;
    ownerFees = state.ownerFees || 0;
    document.getElementById('userProfit').innerText = userProfit.toFixed(2);
    document.getElementById('ownerFees').innerText = ownerFees.toFixed(2);
    // Also fetch wallet balance from a separate endpoint (or combine)
    const walletRes = await fetch('/api/balance', { credentials: 'include' }).then(r => r.json()).catch(() => ({}));
    balance = walletRes.fiat || 0;
    document.getElementById('walletBalance').innerText = balance.toFixed(2);
  }

  async function deposit() {
    const amount = parseFloat(document.getElementById('depositAmount').value);
    if (isNaN(amount) || amount <= 0) { addLog("Invalid amount"); return; }
    const res = await fetch('/api/deposit', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ amount })
    });
    const data = await res.json();
    if (data.error) addLog(`❌ ${data.error}`);
    else addLog(`✅ Deposited $${amount}. New balance: $${data.newBalance}`);
    refreshBalance();
  }

  async function withdraw() {
    const amount = parseFloat(document.getElementById('withdrawAmount').value);
    if (isNaN(amount) || amount <= 0) { addLog("Invalid amount"); return; }
    const res = await fetch('/api/withdraw', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ amount })
    });
    const data = await res.json();
    if (data.error) addLog(`❌ ${data.error}`);
    else addLog(`✅ Withdrew $${amount}. New balance: $${data.newBalance}`);
    refreshBalance();
  }

  async function simulateTrade(type) {
    const amount = parseFloat(document.getElementById('tradeAmount').value);
    if (isNaN(amount) || amount <= 0) { addLog("Invalid trade amount"); return; }
    const profit = amount * (Math.random() * 0.1 + 0.02);
    const feePercent = 3 + Math.random() * 7;
    addLog(`📈 ${type} trade: $${amount} → profit $${profit.toFixed(2)} (fee ${feePercent.toFixed(1)}%)`);
    const res = await apiCall('report-profit', {
      method: 'POST',
      body: JSON.stringify({ profitJMD: profit, feePercent })
    });
    if (res.error) addLog(`❌ ${res.error}`);
    else addLog(`✅ Recorded: user gain $${res.userGain.toFixed(2)}, owner fee $${res.fee.toFixed(2)}`);
    refreshBalance();
  }

  // Simple WalletConnect placeholder (no real connection, just demo)
  document.getElementById('connectWalletBtn')?.addEventListener('click', () => {
    addLog("🔗 WalletConnect demo – would connect to MetaMask/Phantom.");
    document.getElementById('walletStatus').innerText = "Demo wallet connected: 0x7aB...cD3";
  });

  (async () => {
    const me = await fetch('/api/me', { credentials: 'include' }).then(r => r.json());
    if (!me.id) {
      document.getElementById('authMessage').innerHTML = '<div class="card">🔐 Please <a href="/">log in</a> first.</div>';
      return;
    }
    currentUser = me;
    document.getElementById('authMessage').innerHTML = `<div class="card">✅ Logged in as ${me.email}</div>`;
    document.getElementById('traderContent').style.display = 'block';
    await refreshBalance();
    document.getElementById('depositBtn').onclick = deposit;
    document.getElementById('withdrawBtn').onclick = withdraw;
    document.getElementById('buyBtn').onclick = () => simulateTrade('buy');
    document.getElementById('sellBtn').onclick = () => simulateTrade('sell');
  })();
</script>
</body>
</html>
